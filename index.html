
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  
  <!-- ═══ PATCH 4: fetch + XHR auto-bridge for Android WebView ════════════
       Routes http:// and https:// requests through Java HttpURLConnection
       (no CORS restrictions). blob:, data:, file:// use native fetch.
       Falls back to native transparently if window.Android is absent.
       Must be the VERY FIRST script so puter.js picks up the patched fetch.
  ════════════════════════════════════════════════════════════════════════ -->
<script>
(function () {
  // Only activate inside the APK WebView (Java bridge present)
  if (!window.Android || !window.Android.httpRequest) return;

  var _nativeFetch = window.fetch.bind(window);
  var _NativeXHR   = window.XMLHttpRequest;

  /* ── FETCH OVERRIDE ─────────────────────────────────────────────── */
  window.fetch = function (input, init) {
    var url = (input && input.url) ? input.url : String(input);
    if (!/^https?:\/\//i.test(url)) return _nativeFetch(input, init);

    return new Promise(function (resolve, reject) {
      try {
        init = init || {};
        var method  = (init.method  || 'GET').toUpperCase();
        var headers = JSON.stringify(init.headers || {});
        var body    = (init.body != null) ? String(init.body) : '';

        // Java side: Android.httpRequest(url, method, headersJson, body) → JSON string
        var raw     = window.Android.httpRequest(url, method, headers, body);
        var parsed  = JSON.parse(raw);        // {status, statusText, headers, body}

        var responseBody = parsed.body || '';
        var blob = new Blob([responseBody], { type: 'application/json' });
        var resp = new Response(blob, {
          status     : parsed.status     || 200,
          statusText : parsed.statusText || 'OK',
          headers    : new Headers(parsed.headers || {})
        });
        resolve(resp);
      } catch (e) {
        // Fallback to native if bridge call fails
        _nativeFetch(input, init).then(resolve, reject);
      }
    });
  };

  /* ── XHR OVERRIDE (covers axios / $.ajax / raw XHR) ────────────── */
  window.XMLHttpRequest = function () {
    var _self   = this;
    var _method = 'GET', _url = '', _reqHeaders = {}, _body = null;
    var _async  = true;

    // Proxy all properties/methods the app might read
    this.readyState    = 0;
    this.status        = 0;
    this.statusText    = '';
    this.responseText  = '';
    this.response      = '';
    this.responseType  = '';
    this.onreadystatechange = null;
    this.onload  = null;
    this.onerror = null;
    this.timeout = 0;
    this.withCredentials = false;

    function _fire(fn) { if (typeof fn === 'function') try { fn.call(_self); } catch(e){} }

    this.open = function (method, url) {
      _method = method; _url = url;
      _self.readyState = 1;
    };
    this.setRequestHeader = function (k, v) { _reqHeaders[k] = v; };
    this.getResponseHeader = function (k) { return null; };
    this.getAllResponseHeaders = function () { return ''; };
    this.abort = function () {};
    this.overrideMimeType = function () {};

    this.send = function (body) {
      _body = body;
      if (!window.Android || !window.Android.httpRequest || !/^https?:\/\//i.test(_url)) {
        // Fall back to real XHR
        var real = new _NativeXHR();
        real.open(_method, _url, _async);
        Object.keys(_reqHeaders).forEach(function(k){ real.setRequestHeader(k, _reqHeaders[k]); });
        real.onreadystatechange = function () {
          _self.readyState = real.readyState;
          _self.status     = real.status;
          _self.statusText = real.statusText;
          _self.responseText = real.responseText;
          _self.response     = real.response;
          _fire(_self.onreadystatechange);
          if (real.readyState === 4) _fire(_self.onload);
        };
        real.onerror = function () { _fire(_self.onerror); };
        real.send(_body);
        return;
      }

      setTimeout(function () {
        try {
          var raw    = window.Android.httpRequest(_url, _method, JSON.stringify(_reqHeaders), _body || '');
          var parsed = JSON.parse(raw);
          _self.readyState   = 4;
          _self.status       = parsed.status     || 200;
          _self.statusText   = parsed.statusText || 'OK';
          _self.responseText = parsed.body        || '';
          _self.response     = _self.responseText;
          _fire(_self.onreadystatechange);
          _fire(_self.onload);
        } catch (e) {
          _self.readyState = 4; _self.status = 0;
          _fire(_self.onerror);
        }
      }, 0);
    };
  };

  console.log('[PW3-NET] fetch + XHR bridge active');
})();
</script>

  <!-- Android TTS Bridge -->
<script>
(function () {
  if (!window.Android) return;
  if (window._pw5tts) return;
  window._pw5tts = true;

  var FAKE_VOICES = [
    { name: 'Android TTS',        lang: 'en-US', default: true,  localService: true, voiceURI: 'android-tts'    },
    { name: 'Android TTS Female', lang: 'en-US', default: false, localService: true, voiceURI: 'android-female' },
    { name: 'Android TTS GB',     lang: 'en-GB', default: false, localService: true, voiceURI: 'android-gb'     },
    { name: 'Android TTS ML',     lang: 'ml-IN', default: false, localService: true, voiceURI: 'android-ml'     }
  ];

  var _vcListeners = [];
  var _onVCProp    = null;
  var _currentUtt  = null;
  var _endTimer    = null;
  var _pendingUtt  = null;

  window.SpeechSynthesisUtterance = function (text) {
    this.text    = text || '';
    this.rate    = 1.0;
    this.pitch   = 1.0;
    this.volume  = 1.0;
    this.lang    = 'en-US';
    this.voice   = null;
    this.onstart = null;
    this.onend   = null;
    this.onerror = null;
  };

  function _bridgeSpeak(utt) {
    var b    = window.Android;
    var text = String(utt.text || '').trim();
    if (!text) {
      if (utt.onend) try { utt.onend({ type: 'end' }); } catch (e) {}
      return;
    }
    try {
      if (b.speakWithOptions) b.speakWithOptions(text, parseFloat(utt.rate) || 1.0, parseFloat(utt.pitch) || 1.0);
      else if (b.speakTTS)    b.speakTTS(text);
    } catch (e) {
      console.warn('[PW3-TTS] Android bridge call failed:', e);
    }
  }

  function _startFallbackTimer(utt) {
    if (_endTimer) clearTimeout(_endTimer);
    var words = String(utt.text).trim().split(/\s+/).length;
    var wpm   = 150 * Math.max(0.5, parseFloat(utt.rate) || 1.0);
    var ms    = Math.max(2000, (words / wpm) * 60000 + 1500);
    _endTimer = setTimeout(function () {
      if (_currentUtt === utt) {
        _synth.speaking = false;
        _currentUtt     = null;
        if (utt.onend) try { utt.onend({ type: 'end' }); } catch (e) {}
      }
    }, ms);
  }

  var _synth = {
    speaking : false,
    paused   : false,
    pending  : false,

    speak: function (utt) {
      if (!utt) return;
      var clean = String(utt.text || '')
        .replace(/\[.*?\]/g, '')
        .replace(/[*#`_~]/g, '')
        .trim();
      if (!clean) {
        if (utt.onend) try { utt.onend({ type: 'end' }); } catch (e) {}
        return;
      }
      utt.text  = clean;
      utt.voice = null;

      _pendingUtt   = null;
      _currentUtt   = utt;
      this.speaking = true;

      if (utt.onstart) try { utt.onstart({ type: 'start' }); } catch (e) {}

      _bridgeSpeak(utt);
      _startFallbackTimer(utt);
    },

    cancel: function () {
      this.speaking = false;
      _currentUtt   = null;
      _pendingUtt   = null;
      if (_endTimer) { clearTimeout(_endTimer); _endTimer = null; }
      var b = window.Android;
      if (b && b.stopSpeaking) try { b.stopSpeaking(); } catch (e) {}
    },

    pause:  function () { this.paused = true;  },
    resume: function () { this.paused = false; },

    getVoices: function () {
      var b = window.Android;
      if (b && b.getVoices) {
        try { var v = JSON.parse(b.getVoices()); if (v && v.length) return v; } catch (e) {}
      }
      return FAKE_VOICES;
    },

    addEventListener: function (evt, fn) {
      if (evt === 'voiceschanged') {
        if (_vcListeners.indexOf(fn) === -1) _vcListeners.push(fn);
        setTimeout(fn, 0);
      }
    },

    removeEventListener: function (evt, fn) {
      if (evt === 'voiceschanged')
        _vcListeners = _vcListeners.filter(function (f) { return f !== fn; });
    }
  };

  try {
    Object.defineProperty(_synth, 'onvoiceschanged', {
      get: function ()   { return _onVCProp; },
      set: function (fn) {
        _onVCProp = fn;
        if (fn) {
          if (_vcListeners.indexOf(fn) === -1) _vcListeners.push(fn);
          setTimeout(fn, 0);
        }
      },
      configurable: true
    });
  } catch (e) {}

  window.speechSynthesis = _synth;

  window._onTTSDone = function () {
    _synth.speaking = false;
    if (_endTimer) { clearTimeout(_endTimer); _endTimer = null; }
    var utt = _currentUtt;
    _currentUtt = null;
    if (utt && utt.onend) try { utt.onend({ type: 'end' }); } catch (e) {}
  };

  window._fireTTSReady = function () {
    _vcListeners.forEach(function (fn) { try { fn(); } catch (e) {} });
    if (_pendingUtt) {
      var utt = _pendingUtt;
      _pendingUtt = null;
      _synth.speak(utt);
    }
  };

  window.nativeSpeak = function (text, rate, pitch) {
    var utt   = new window.SpeechSynthesisUtterance(text);
    utt.rate  = rate  || 1.0;
    utt.pitch = pitch || 1.0;
    _synth.speak(utt);
  };

})();
</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prof Kingkeys Academy: Master</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://js.puter.com/v2/"></script>
<script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
:root{
  --bg:#050507; --bg2:#0a0c12; --panel:#111420; --panel2:#1a1e2e;
  --border:#252a3d; --gold:#f0b429; --gold2:#ffd166; 
  --blue:#4d9eff; --green:#22d37a; --red:#ff4d4d; --purple:#c084fc;
  --orange:#ff8c42; --white:#e4e6eb; --text:#9aa5c4;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif; overflow-x:hidden;}

/* ═══════ UPLOAD SCREEN ═══════ */
#uploadScreen{
  align-items:center;justify-content:center;padding:20px; min-height:100vh;
  background: radial-gradient(circle at 50% 10%, rgba(77,158,255,0.08), transparent 70%);
}
.upload-box{width:100%;max-width:800px;animation:fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.brand-header{text-align:center;margin-bottom:24px;}
.brand-crown{font-size:54px;display:inline-block;animation:float 4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.brand-title{
  font-size:clamp(24px, 5vw, 42px); font-weight:800; letter-spacing:-1px;
  background:linear-gradient(135deg, var(--gold2), var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.input-area{
  background:var(--panel);border:1px solid var(--border);border-radius:20px;
  padding:8px; position:relative; box-shadow:0 20px 40px rgba(0,0,0,0.3);
}
textarea#userInput{
  width:100%;min-height:350px;background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;padding:24px; padding-bottom:70px;
  font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--white);
  resize:vertical;outline:none;line-height:1.7; transition:border 0.3s;
}
textarea#userInput:focus{border-color:var(--blue);}

.tools-row{
  position:absolute; bottom:20px; right:20px; display:flex; gap:10px;
}
.tool-btn{
  background:var(--panel2); border:1px solid var(--border); color:var(--text);
  padding:12px 18px; border-radius:12px; font-size:13px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; gap:8px; transition:all 0.2s;
}
.tool-btn:active{transform:scale(0.95);}
.tool-btn.camera{border-color:var(--gold); color:var(--gold);}

.action-row{display:flex;gap:12px;margin-top:24px;}
.btn-main{
  flex:1;padding:20px;border-radius:16px;border:none;cursor:pointer;
  font-family:'Sora',sans-serif;font-size:16px;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:10px; transition:all 0.2s;
}
.btn-gen{background:var(--gold);color:#000;box-shadow:0 8px 24px rgba(240,180,41,0.25);}
.btn-gen:active{transform:scale(0.98);}
.btn-read{background:var(--panel2);border:1px solid var(--border);color:var(--white);}

/* ═══════ READER ═══════ */
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

#readerScreen{background:var(--bg);}
.reader-top{
  padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);background:rgba(17,20,32,0.95);
  backdrop-filter:blur(10px); position:sticky;top:0;z-index:50;
}
.back-btn{background:none; border:none; color:var(--text); font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px; font-size:14px;}

.reader-content{
  flex:1;padding:30px 16px 200px 16px;max-width:800px;margin:0 auto;width:100%;
  line-height:2.2;font-size:18px;color:var(--text);
  overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
  word-break:break-word;overflow-wrap:anywhere;
  box-sizing:border-box;
}
.reader-sentence{
  cursor: pointer; display:inline;
  margin-right: 3px; line-height:2;
  word-break:break-word; overflow-wrap:anywhere;
}
.reader-sentence.active{}
.reader-content p{margin-bottom:14px;line-height:2.2;word-break:break-word;overflow-wrap:anywhere;max-width:100%;}
.reader-content ol,.reader-content ul{padding-left:26px;margin:10px 0 14px;}
.reader-content li{margin-bottom:9px;line-height:1.9;word-break:break-word;overflow-wrap:anywhere;}
.reader-content li.reader-sentence{display:list-item;}
.reader-heading{font-weight:800;color:var(--gold);margin:20px 0 8px;line-height:1.4;word-break:break-word;}
.reader-sentence strong { color: var(--gold); }
.reader-sentence em { color: var(--gold2); }
/* Math expression styling */
.math-expr{
  font-family:'JetBrains Mono',monospace;
  background:rgba(77,158,255,0.08);
  border:1px solid rgba(77,158,255,0.2);
  border-radius:6px;padding:3px 8px;
  color:var(--blue);font-size:0.88em;
  display:inline-block;line-height:1.8;
  white-space:normal;
  word-break:break-word;
  overflow-wrap:anywhere;
  max-width:100%;
  vertical-align:middle;
}

/* ═══════ MARKDOWN RENDERING STYLES ═══════ */
/* Code Blocks (``` ... ```) - For ASCII art, diagrams, code */
.reader-content pre.code-block {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  margin: 16px 0;
  overflow-x: auto;
  overflow-y: hidden;
  max-width: 100%;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
}
.reader-content pre.code-block code {
  font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
  font-size: 13px;
  line-height: 1.6;
  color: var(--white);
  white-space: pre;
  display: block;
  tab-size: 4;
  -moz-tab-size: 4;
  word-wrap: normal;
  word-break: normal;
  overflow-wrap: normal;
}

/* Inline code (`...`) */
.reader-content code.inline-code {
  font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
  background: rgba(77,158,255,0.08);
  border: 1px solid rgba(77,158,255,0.15);
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 0.9em;
  color: var(--blue);
  white-space: nowrap;
}

/* Tables */
.reader-content table.md-table {
  border-collapse: collapse;
  width: 100%;
  max-width: 100%;
  margin: 16px 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  background: var(--panel);
}
.reader-content table.md-table tr {
  border-bottom: 1px solid var(--border);
}
.reader-content table.md-table tr:last-child {
  border-bottom: none;
}
.reader-content table.md-table td {
  padding: 10px 12px;
  color: var(--text);
  font-size: 14px;
  border-right: 1px solid var(--border);
}
.reader-content table.md-table td:last-child {
  border-right: none;
}
.reader-content table.md-table tr:first-child td {
  background: var(--panel2);
  color: var(--gold);
  font-weight: 700;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.5px;
}

/* Blockquotes */
.reader-content blockquote {
  border-left: 3px solid var(--gold);
  padding-left: 16px;
  margin: 16px 0;
  color: var(--text);
  font-style: italic;
  background: rgba(240,180,41,0.03);
  padding: 12px 16px;
  border-radius: 0 8px 8px 0;
}

/* Horizontal Rules */
.reader-content hr {
  border: none;
  height: 1px;
  background: var(--border);
  margin: 24px 0;
}

/* Headers in rendered markdown */
.reader-content h1, .reader-content h2, .reader-content h3, 
.reader-content h4, .reader-content h5, .reader-content h6 {
  color: var(--gold);
  font-weight: 800;
  margin: 20px 0 12px 0;
  line-height: 1.3;
}
.reader-content h1 { font-size: 24px; }
.reader-content h2 { font-size: 21px; }
.reader-content h3 { font-size: 18px; }
.reader-content h4 { font-size: 16px; }
.reader-content h5 { font-size: 15px; }
.reader-content h6 { font-size: 14px; }

/* Links */
.reader-content a {
  color: var(--blue);
  text-decoration: none;
  border-bottom: 1px solid rgba(77,158,255,0.3);
  transition: border-color 0.2s;
}
.reader-content a:hover {
  border-bottom-color: var(--blue);
}

/* Strong and emphasis */
.reader-content strong {
  font-weight: 700;
  color: var(--gold);
}
.reader-content em {
  font-style: italic;
  color: var(--gold2);
}

/* Lists */
.reader-content ul {
  list-style-type: disc;
  padding-left: 26px;
  margin: 12px 0;
}
.reader-content ol {
  list-style-type: decimal;
  padding-left: 26px;
  margin: 12px 0;
}
.reader-content li {
  margin-bottom: 8px;
  line-height: 1.8;
}
/* Table stacked cards */
.reader-table-wrap{
  width:100%;max-width:100%;margin:16px 0;display:flex;flex-direction:column;gap:10px;
}
.reader-table-header-bar{
  display:flex;width:100%;border-radius:10px 10px 0 0;overflow:hidden;
  border:1px solid var(--border);border-bottom:none;
}
.reader-table-header-bar span{
  flex:1;background:var(--panel2);color:var(--gold);
  font-weight:700;font-size:11px;padding:8px 10px;
  text-transform:uppercase;letter-spacing:0.3px;
  border-right:1px solid var(--border);line-height:1.4;
}
.reader-table-header-bar span:last-child{border-right:none;}
.reader-table-card{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;cursor:pointer;transition:border-color 0.2s;width:100%;
}
.reader-table-card.reader-sentence.active{}
.reader-table-card:active{opacity:0.75;}
.rtc-row{
  display:flex;align-items:flex-start;
  border-bottom:1px solid var(--border);padding:9px 13px;gap:10px;
}
.rtc-row:last-child{border-bottom:none;}
.rtc-label{
  min-width:105px;max-width:115px;font-size:11px;font-weight:700;
  color:var(--gold);line-height:1.5;padding-top:1px;flex-shrink:0;
  text-transform:uppercase;letter-spacing:0.2px;word-break:break-word;
}
.rtc-value{
  font-size:13px;color:var(--white);line-height:1.6;
  word-break:break-word;flex:1;
}
.reader-divider{height:1px;background:var(--border);margin:16px 0;}

/* ── Player Dock (multi-row) ── */
.player-dock{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(17,20,32,0.97);backdrop-filter:blur(12px);
  border:1px solid var(--border);padding:12px 20px;border-radius:24px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  box-shadow:0 20px 50px rgba(0,0,0,0.6); z-index:100;
  width:calc(100vw - 32px);max-width:480px;
}
.dock-row{display:flex;align-items:center;gap:10px;width:100%;}
.dock-row.centered{justify-content:center;}
.p-btn-lg{
  width:56px;height:56px;border-radius:50%;
  font-size:22px;background:var(--gold);color:#050507;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.p-music-btn{
  padding:8px 12px;border-radius:12px;background:var(--panel2);
  border:1px solid var(--border);color:var(--text);cursor:pointer;
  font-size:16px;flex-shrink:0;transition:all 0.2s;
}
.p-music-btn.muted{border-color:var(--red);color:var(--red);}
.speed-slider{
  -webkit-appearance:none;appearance:none;
  flex:1;height:4px;border-radius:4px;
  background:var(--border);outline:none;cursor:pointer;
}
.speed-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:18px;height:18px;border-radius:50%;
  background:var(--gold);cursor:pointer;border:2px solid var(--bg);
}
.speed-val{
  font-family:'JetBrains Mono',monospace;font-size:13px;

<script>
// ═══════════════════════════════════════════════
//   VOICE WHITELIST (your curated favorites)
// ═══════════════════════════════════════════════
const FAVE_LANGS = [
  'da-dk','da_dk','zh-tw','zh_tw','el-gr','el_gr',
  'en-au','en_au','en-gb','en_gb',
  'es-es','es_es','he-il','he_il','lt-lt','lt_lt',
  'ml-in','ml_in',  // ← Malayalam India (your preferred voice)
  'ms-my','ms_my','pa-in','pa_in','ta-in','ta_in',
  'th-th','th_th','ur-in','ur_in','vi-vn','vi_vn'
];

// ═══════════════════════════════════════════════
//   UNICODE NORMALIZER — runs BEFORE any rendering
//   Converts Math Italic/Bold Unicode letters → ASCII
//   Converts Unicode sub/superscript digits → HTML
// ═══════════════════════════════════════════════
function normalizeMathUnicode(text) {
  if (!text) return text;
  // Map a single Unicode math code point to ASCII
  function mathCharToASCII(cp) {
    // Mathematical Bold A-Z, a-z  (U+1D400–U+1D433)
    if (cp >= 0x1D400 && cp <= 0x1D419) return String.fromCharCode(cp - 0x1D400 + 65);
    if (cp >= 0x1D41A && cp <= 0x1D433) return String.fromCharCode(cp - 0x1D41A + 97);
    // Mathematical Italic A-Z, a-z  (U+1D434–U+1D467)
    if (cp >= 0x1D434 && cp <= 0x1D44D) return String.fromCharCode(cp - 0x1D434 + 65);
    if (cp >= 0x1D44E && cp <= 0x1D467) return String.fromCharCode(cp - 0x1D44E + 97);
    // Mathematical Bold Italic A-Z, a-z  (U+1D468–U+1D49B)
    if (cp >= 0x1D468 && cp <= 0x1D481) return String.fromCharCode(cp - 0x1D468 + 65);
    if (cp >= 0x1D482 && cp <= 0x1D49B) return String.fromCharCode(cp - 0x1D482 + 97);
    // Mathematical Sans Bold A-Z, a-z  (U+1D5D4–U+1D607)
    if (cp >= 0x1D5D4 && cp <= 0x1D5ED) return String.fromCharCode(cp - 0x1D5D4 + 65);
    if (cp >= 0x1D5EE && cp <= 0x1D607) return String.fromCharCode(cp - 0x1D5EE + 97);
    // Mathematical Monospace A-Z, a-z  (U+1D670–U+1D6A3)
    if (cp >= 0x1D670 && cp <= 0x1D689) return String.fromCharCode(cp - 0x1D670 + 65);
    if (cp >= 0x1D68A && cp <= 0x1D6A3) return String.fromCharCode(cp - 0x1D68A + 97);
    // Script / Fraktur ranges
    if (cp >= 0x1D49C && cp <= 0x1D4CF) {
      const base = cp - 0x1D49C;
      if (base < 26) return String.fromCharCode(base + 65);
      if (base < 52) return String.fromCharCode(base - 26 + 97);
    }
    // Double-struck A-Z (U+1D538–U+1D56B)
    if (cp >= 0x1D538 && cp <= 0x1D551) return String.fromCharCode(cp - 0x1D538 + 65);
    if (cp >= 0x1D552 && cp <= 0x1D56B) return String.fromCharCode(cp - 0x1D552 + 97);
    // Fullwidth latin A-Z (U+FF21–FF3A), a-z (U+FF41–FF5A)
    if (cp >= 0xFF21 && cp <= 0xFF3A) return String.fromCharCode(cp - 0xFF21 + 65);
    if (cp >= 0xFF41 && cp <= 0xFF5A) return String.fromCharCode(cp - 0xFF41 + 97);
    return null; // not a math letter
  }

  // Pass 1: replace math Unicode letters with ASCII
  let result = '';
  for (let i = 0; i < text.length; ) {
    const cp = text.codePointAt(i);
    const ascii = mathCharToASCII(cp);
    if (ascii !== null) {
      result += ascii;
    } else {
      result += text[i];
      if (cp > 0xFFFF) result += text[i + 1]; // surrogate pair second half
    }
    i += (cp > 0xFFFF ? 2 : 1);
  }

  // Pass 2: Unicode subscript/superscript digits + signs → HTML tags
  const subMap = {'₀':'0','₁':'1','₂':'2','₃':'3','₄':'4','₅':'5','₆':'6','₇':'7','₈':'8','₉':'9','₊':'+','₋':'-','₌':'=','₍':'(','₎':')'};
  const supMap = {'⁰':'0','¹':'1','²':'2','³':'3','⁴':'4','⁵':'5','⁶':'6','⁷':'7','⁸':'8','⁹':'9','⁺':'+','⁻':'-','⁼':'=','⁽':'(','⁾':')'};
  // Replace runs of subscript chars
  result = result.replace(/[₀₁₂₃₄₅₆₇₈₉₊₋₌₍₎]+/g, m => '<sub>' + m.split('').map(c => subMap[c] || c).join('') + '</sub>');
  // Replace runs of superscript chars
  result = result.replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹⁺⁻⁼⁽⁾]+/g, m => '<sup>' + m.split('').map(c => supMap[c] || c).join('') + '</sup>');

  // Pass 3: normalize dash types used in chemical bonds
  // En dash (–) and em dash (—) used as bond dashes → regular hyphen-minus
  // BUT only when surrounded by chem-like chars, not in general text
  result = result.replace(/([A-Za-z0-9\]\)])\u2013([A-Za-z0-9\[\(])/g, '$1-$2'); // en dash
  result = result.replace(/([A-Za-z0-9\]\)])\u2014([A-Za-z0-9\[\(])/g, '$1-$2'); // em dash

  // Pass 4: curly/smart apostrophes & quotes → straight (for prime marks in chem)
  result = result.replace(/[\u2018\u2019\u02BC]/g, "'"); // curly single quotes → '
  result = result.replace(/[\u201C\u201D]/g, '"');       // curly double quotes → "

  return result;
}

// ═══════════════════════════════════════════════
//   MATH RENDERER (converts LaTeX-style to HTML)
// ═══════════════════════════════════════════════
function renderMath(text) {
  if (!text) return text;
  let t = normalizeMathUnicode(text); // ← normalize Unicode math chars FIRST
  // 1. Strip formatting wrappers — reveal plain content
  t = t.replace(/\\text\{([^}]+)\}/g, '$1');
  t = t.replace(/\\mathrm\{([^}]+)\}/g, '$1');
  t = t.replace(/\\mathbf\{([^}]+)\}/g, '<strong>$1</strong>');
  t = t.replace(/\\textbf\{([^}]+)\}/g, '<strong>$1</strong>');
  // 2. Labeled arrows — render as stacked label-over-arrow (proper chemistry notation)
  t = t.replace(/\\xrightarrow\{([^}]*)\}/g, function(_, label) {
    if (!label.trim()) return '<span style="color:var(--blue);margin:0 4px;">→</span>';
    // process subscripts in the label itself
    let lbl = label
      .replace(/\_\{([^}]+)\}/g, '<sub>$1</sub>').replace(/_([A-Za-z0-9])/g, '<sub>$1</sub>')
      .replace(/\^\{([^}]+)\}/g, '<sup>$1</sup>').replace(/\^([A-Za-z0-9])/g, '<sup>$1</sup>');
    return `<span style="display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 6px;line-height:1.1;"><span style="font-size:0.7em;color:var(--gold);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis;" title="${label}">${lbl}</span><span style="color:var(--blue);font-size:1.05em;letter-spacing:-1px;">─────→</span></span>`;
  });
  t = t.replace(/\\xleftarrow\{([^}]*)\}/g, function(_, label) {
    if (!label.trim()) return '<span style="color:var(--blue);margin:0 4px;">←</span>';
    let lbl = label
      .replace(/\_\{([^}]+)\}/g, '<sub>$1</sub>').replace(/_([A-Za-z0-9])/g, '<sub>$1</sub>');
    return `<span style="display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 6px;line-height:1.1;"><span style="font-size:0.7em;color:var(--gold);white-space:nowrap;">${lbl}</span><span style="color:var(--blue);font-size:1.05em;letter-spacing:-1px;">←─────</span></span>`;
  });
  // 3. Arrows & relation symbols
  t = t.replace(/\\rightleftharpoons/g, ' ⇌ ');
  t = t.replace(/\\leftrightarrow/g, ' ↔ ');
  t = t.replace(/\\Leftrightarrow/g, ' ⟺ ');
  t = t.replace(/\\Rightarrow/g, ' ⇒ ');
  t = t.replace(/\\Leftarrow/g, ' ⇐ ');
  t = t.replace(/\\rightarrow/g, ' → ');
  t = t.replace(/\\leftarrow/g, ' ← ');
  t = t.replace(/\\to\b/g, ' → ');
  t = t.replace(/\\gets\b/g, ' ← ');
  // 4. Prime notation (before subscript/superscript processing)
  t = t.replace(/\\prime\\prime\\prime/g, '‴');
  t = t.replace(/\\prime\\prime/g, '″');
  t = t.replace(/\\prime/g, '′');
  // 5. Common math symbols
  t = t.replace(/\\times/g, '×').replace(/\\cdot/g, '·').replace(/\\div/g, '÷')
       .replace(/\\pm/g, '±').replace(/\\mp/g, '∓')
       .replace(/\\approx/g, '≈').replace(/\\neq/g, '≠').replace(/\\equiv/g, '≡')
       .replace(/\\leq/g, '≤').replace(/\\geq/g, '≥')
       .replace(/\\ll/g, '≪').replace(/\\gg/g, '≫')
       .replace(/\\infty/g, '∞').replace(/\\partial/g, '∂')
       .replace(/\\nabla/g, '∇').replace(/\\forall/g, '∀').replace(/\\exists/g, '∃')
       .replace(/\\in\b/g, '∈').replace(/\\notin\b/g, '∉')
       .replace(/\\subset/g, '⊂').replace(/\\supset/g, '⊃')
       .replace(/\\cup/g, '∪').replace(/\\cap/g, '∩')
       .replace(/\\sum/g, '∑').replace(/\\prod/g, '∏').replace(/\\int/g, '∫');
  // 6. Greek letters
  t = t.replace(/\\Alpha/g,'Α').replace(/\\Beta/g,'Β').replace(/\\Gamma/g,'Γ')
       .replace(/\\Delta/g,'Δ').replace(/\\Epsilon/g,'Ε').replace(/\\Zeta/g,'Ζ')
       .replace(/\\Eta/g,'Η').replace(/\\Theta/g,'Θ').replace(/\\Lambda/g,'Λ')
       .replace(/\\Mu/g,'Μ').replace(/\\Pi/g,'Π').replace(/\\Sigma/g,'Σ')
       .replace(/\\Omega/g,'Ω').replace(/\\Phi/g,'Φ').replace(/\\Psi/g,'Ψ');
  t = t.replace(/\\alpha/g,'α').replace(/\\beta/g,'β').replace(/\\gamma/g,'γ')
       .replace(/\\delta/g,'δ').replace(/\\epsilon/g,'ε').replace(/\\zeta/g,'ζ')
       .replace(/\\eta/g,'η').replace(/\\theta/g,'θ').replace(/\\iota/g,'ι')
       .replace(/\\kappa/g,'κ').replace(/\\lambda/g,'λ').replace(/\\mu/g,'μ')
       .replace(/\\nu/g,'ν').replace(/\\xi/g,'ξ').replace(/\\pi/g,'π')
       .replace(/\\rho/g,'ρ').replace(/\\sigma/g,'σ').replace(/\\tau/g,'τ')
       .replace(/\\upsilon/g,'υ').replace(/\\phi/g,'φ').replace(/\\chi/g,'χ')
       .replace(/\\psi/g,'ψ').replace(/\\omega/g,'ω');
  // 7. Subscripts & superscripts (AFTER arrows/prime so nested {} already handled)
  t = t.replace(/\_\{([^}]+)\}/g, '<sub>$1</sub>');
  t = t.replace(/_([A-Za-z0-9])/g, '<sub>$1</sub>');
  t = t.replace(/\^\{([^}]+)\}/g, '<sup>$1</sup>');
  t = t.replace(/\^([A-Za-z0-9])/g, '<sup>$1</sup>');
  // 8. Square root
  t = t.replace(/\\sqrt\{([^}]+)\}/g, function(_, v){ return '<span class="math-expr">√(' + v + ')</span>'; });
  t = t.replace(/\\sqrt\s+([A-Za-z0-9])/g, function(_, v){ return '<span class="math-expr">√' + v + '</span>'; });
  // 9. Fractions
  t = t.replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, function(_, n, d){ return '<span class="math-expr">(' + n + ')/(' + d + ')</span>'; });
  // 10. Remaining stray backslash commands — strip the backslash
  t = t.replace(/\\([a-zA-Z]+)/g, '$1');
  return t;
}

// Detect if a string contains math-like patterns
function hasMath(text) {
  return /[_\^\\]/.test(text) || /\\[a-z]+/.test(text);
}

// ═══════════════════════════════════════════════
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function normalize(str) {
  return (str || '').toString().toLowerCase()
    .replace(/[^\w\s]|_/g, "").replace(/\s+/g, " ").trim();
}

// Returns 0–1 word-overlap ratio (ignoring stop words)
function wordMatchScore(raw_user, raw_correct) {
  const STOP = new Set(['the','a','an','of','in','is','are','and','or','to','for','with','by','on','at','as','its','it','this','that','these','those','have','has','had','be','been','can','will','would','could','should','may','might']);
  const u = normalize(raw_user).split(' ').filter(w => w.length > 2 && !STOP.has(w));
  const c = normalize(raw_correct).split(' ').filter(w => w.length > 2 && !STOP.has(w));
  if (!u.length || !c.length) return 0;
  const matched = u.filter(uw => c.some(cw => cw === uw || (cw.length > 4 && uw.length > 4 && (cw.startsWith(uw.slice(0,5)) || uw.startsWith(cw.slice(0,5))))));
  return matched.length / Math.max(u.length, c.length);
}

function smartMatch(raw_user, raw_correct) {
  const u = normalize(raw_user);
  const c = normalize(raw_correct);
  if (!u || !c) return false;
  if (u === c) return true;
  // Substring containment — only if the shorter string is substantial
  const minLen = Math.min(u.length, c.length);
  if (minLen >= 8 && (u.includes(c) || c.includes(u))) return true;
  // Stem match — first 78% characters, only for short answers
  if (minLen >= 5 && minLen <= 30) {
    const stemLen = Math.max(4, Math.floor(minLen * 0.78));
    if (u.substring(0, stemLen) === c.substring(0, stemLen)) return true;
  }
  // Acronym match (e.g. user types CMC, correct is Critical Micelle Concentration)
  function makeAcronym(words) { return words.filter(w => w.length > 0).map(w => w[0]).join(''); }
  const uAcro = makeAcronym(u.replace(/[^\w\s]/g,'').split(' ').filter(Boolean));
  const cAcro = makeAcronym(c.replace(/[^\w\s]/g,'').split(' ').filter(Boolean));
  if ((u.length <= 8 && u === cAcro) || (c.length <= 8 && c === uAcro)) return true;
  // Word overlap — raised threshold to 0.72 to prevent false positives on similar MCQ options
  const score = wordMatchScore(raw_user, raw_correct);
  if (score >= 0.72) return true;
  return false;
}

// Check user answer against all pipe-separated correct answers
function matchesAnyAnswer(userInput, answerField) {
  const answers = (answerField || '').split('|').map(a => a.trim()).filter(Boolean);
  return answers.some(ans => smartMatch(userInput, ans));
}

// ── Format quiz reveal ──
function formatReveal(text) {
  if (!text) return '';
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if (lines.length <= 1) return `<span>${cleanDisplay(text)}</span>`;
  let html = '';
  lines.forEach(line => {
    if (/^\d+[\.\)]\s+/.test(line)) {
      const content = line.replace(/^\d+[\.\)]\s*/, '');
      html += `<div style="display:flex;gap:8px;margin:5px 0;"><span style="color:var(--gold);font-weight:700;flex-shrink:0;">${line.match(/^\d+/)[0]}.</span><span>${cleanDisplay(content)}</span></div>`;
    } else if (/^[\*\-•–]\s+/.test(line)) {
      const content = line.replace(/^[\*\-•–]\s*/, '');
      html += `<div style="display:flex;gap:8px;margin:5px 0;"><span style="color:var(--gold);flex-shrink:0;">▸</span><span>${cleanDisplay(content)}</span></div>`;
    } else if (/^[A-Z*#].*:$/.test(line) || /^\*\*/.test(line)) {
      html += `<div style="color:var(--gold);font-weight:700;margin:10px 0 4px;">${cleanDisplay(line)}</div>`;
    } else {
      html += `<div style="margin:4px 0;">${cleanDisplay(line)}</div>`;
    }
  });
  return html;
}

function initBgMusic() {
  if (!musicEnabled) return;
  if (bgMusic) { bgMusic.play().catch(()=>{}); return; }
  bgMusic = new Audio('https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3');
  bgMusic.loop = true;
  bgMusic.volume = MUSIC_VOL_QUIET;
  bgMusic.play().catch(() => {});
}

function fadeMusicTo(target) {
  if (!bgMusic) return;
  clearInterval(musicFadeTimer);
  const step = target > bgMusic.volume ? 0.008 : -0.008;
  musicFadeTimer = setInterval(() => {
    const next = bgMusic.volume + step;
    if ((step > 0 && next >= target) || (step < 0 && next <= target)) {
      bgMusic.volume = Math.max(0, Math.min(1, target));
      clearInterval(musicFadeTimer);
    } else {
      bgMusic.volume = Math.max(0, Math.min(1, next));
    }
  }, 25);
}

function musicDuck()  { fadeMusicTo(MUSIC_VOL_SPEAK); }
function musicRise()  { fadeMusicTo(MUSIC_VOL_QUIET); }

function stopBgMusic() {
  clearInterval(musicFadeTimer);
  if (bgMusic) { bgMusic.pause(); bgMusic.currentTime = 0; bgMusic = null; }
}

// ── Voice selection ──
function populateVoiceSelects() {
  const voices = synth.getVoices();
  if (!voices || !voices.length) return;

  // Each select has its own label and state variable
  const configs = [
    { id: 'readerVoiceSelect', defaultLabel: '🎧 Reader Voice (Auto-English)', stateKey: 'readerVoiceName' },
    { id: 'quizVoiceSelect',   defaultLabel: '🎙 Quiz Voice (Auto-English)',   stateKey: 'quizVoiceName'   }
  ];

  configs.forEach(cfg => {
    const sel = document.getElementById(cfg.id);
    if (!sel) return;
    const prev = sel.value;   // preserve current selection across re-population
    sel.innerHTML = '';
    const def = document.createElement('option');
    def.value = '';
    def.textContent = cfg.defaultLabel;
    sel.appendChild(def);

    let added = new Set();
    voices.forEach(v => {
      const ll = v.lang.toLowerCase();
      const nl = v.name.toLowerCase();
      const isFav = FAVE_LANGS.some(f => ll.includes(f) || nl.includes(f));
      if (isFav && !added.has(v.name)) {
        const opt = document.createElement('option');
        opt.value = v.name;
        const isML = ll.includes('ml') && ll.includes('in');
        opt.textContent = isML ? `⭐ ${v.name} (Malayalam IN)` : `${v.name} (${v.lang})`;
        sel.appendChild(opt);
        added.add(v.name);
      }
    });
    // Restore previous selection — keeps reader & quiz voices independent
    if (prev && [...sel.options].some(o => o.value === prev)) sel.value = prev;
  });
}

async function handlePhotos(input) {
  if (input.files.length === 0) return;
  toggleLoader(true, "Scanning...", "Loading OCR Engine...");
  let combinedText = "";
  try {
    for (let i = 0; i < input.files.length; i++) {
      toggleLoader(true, `Scanning Img ${i+1}...`, "Pattern Matching...");
      const { data: { text } } = await Tesseract.recognize(input.files[i], 'eng', { logger: m => {} });
      combinedText += `\n${text}\n`;
    }
    if (!combinedText.trim()) throw new Error("No text found.");
    extractedTextBuffer = combinedText.trim();

    document.getElementById('extractContent').innerText = extractedTextBuffer;
    document.getElementById('extractOverlay').classList.add('active');

    showToast("❌ OCR Failed: " + (e.message || "Try again"));

//   DISPLAY HELPERS
// ═══════════════════════════════════════════════
function cleanDisplay(text) {
  if (!text) return '';
  
  // 1. Handle inline code FIRST (before other processing)
  let t = String(text);
  
  // Extract inline code blocks to preserve them
  const inlineCodeBlocks = [];
  t = t.replace(/`([^`]+?)`/g, function(match, code) {
    const index = inlineCodeBlocks.length;
    inlineCodeBlocks.push(code);
    return `___INLINECODE_${index}___`;
  });
  
  // 2. Normalize Unicode math characters (before renderMath)
  t = renderMath(normalizeMathUnicode(t));
  
  // 3. Markdown → HTML (bold, italic)
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  
  // Clean up remaining * and #
  t = t.replace(/\*/g, '');
  t = t.replace(/#/g, '');
  
  // 4. Restore inline code blocks
  inlineCodeBlocks.forEach((code, index) => {
    // Escape HTML in inline code
    const escaped = code
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    t = t.replace(`___INLINECODE_${index}___`, `<code class="inline-code">${escaped}</code>`);
  });
  
  return t.trim();
}

function cleanSpeech(text) {
  return (text || '').toString()
    .replace(/\\text\{([^}]+)\}/g, '$1').replace(/\\mathrm\{([^}]+)\}/g, '$1')
    .replace(/\\xrightarrow\{([^}]+)\}/g, 'with $1 gives')
    .replace(/\\xrightarrow/g, 'gives')
    .replace(/\\rightleftharpoons/g, 'in equilibrium with')
    .replace(/\\rightarrow/g, 'gives').replace(/\\leftarrow/g, 'from')
    .replace(/\\Rightarrow/g, 'implies').replace(/\\to\b/g, 'gives')
    .replace(/→/g, 'gives').replace(/←/g, 'from').replace(/⇌/g, 'in equilibrium with')
    .replace(/\\prime\\prime/g, 'double prime').replace(/\\prime/g, 'prime')
    .replace(/′′/g, 'double prime').replace(/′/g, 'prime')
    .replace(/\\times/g, 'times').replace(/\\div/g, 'divided by').replace(/\\pm/g, 'plus or minus')
    .replace(/\\approx/g, 'approximately').replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '$1 over $2')
    .replace(/\\sqrt\{([^}]+)\}/g, 'square root of $1')
    .replace(/\_\{([^}]+)\}/g, ' $1 ').replace(/_([A-Za-z0-9])/g, ' $1 ')
    .replace(/\^\{([^}]+)\}/g, ' to the power of $1 ').replace(/\^([A-Za-z0-9])/g, ' to the $1 ')
    .replace(/\\[a-zA-Z]+/g, '')
    .replace(/\*+/g, '').replace(/#+/g, '').replace(/`/g, '').replace(/<[^>]+>/g, '')
    .replace(/\s+/g, ' ').trim();
}

// ═══════════════════════════════════════════════
//   READER MODE
// ═══════════════════════════════════════════════
function isTableRow(line) { return /^\|.+\|/.test(line); }
function isTableSep(line) { return /^\|[\s\-:|]+\|/.test(line); }

function formatTextToHTML(rawText) {
  sentences = [];
  let sid = 0;

  function addSentence(speechText, displayHTML, tag, extraStyle) {
    const idx = sid++;
    sentences.push(cleanSpeech(speechText));
    const t = tag || 'span';
    const style = extraStyle ? ` style="${extraStyle}"` : '';
    return `<${t} id="sent-${idx}" class="reader-sentence" onclick="clickToRead(${idx})"${style}>${displayHTML}</${t}>`;
  }

  function splitSentences(text) {
    var marked = text.replace(/([.!?])\s+([A-Z])/g, '$1\x00$2');
    var parts = marked.split('\x00');
    return parts.map(function(p){ return p.trim(); }).filter(function(p){ return p.length > 1; });
  }

  // ═══ STEP 1: Extract code blocks FIRST (before any processing) ═══
  const codeBlocks = [];
  let processedText = rawText.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  
  // Match ```language\n...code...\n``` blocks
  processedText = processedText.replace(/```([^\n]*)\n([\s\S]*?)```/g, function(match, lang, code) {
    const index = codeBlocks.length;
    codeBlocks.push({ lang: lang.trim(), code: code });
    return `\n___CODEBLOCK_${index}___\n`;
  });

  // ═══ STEP 2: Process line by line (original logic) ═══
  let html = '';
  const lines = processedText.split('\n');
  let i = 0;

  while (i < lines.length) {
    let line = lines[i].trimEnd();
    const trimmed = line.trim();

    // Check if this is a code block placeholder
    const codeBlockMatch = trimmed.match(/^___CODEBLOCK_(\d+)___$/);
    if (codeBlockMatch) {
      const blockIndex = parseInt(codeBlockMatch[1]);
      const block = codeBlocks[blockIndex];
      if (block) {
        // Escape HTML in code
        const escapedCode = block.code
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
        const langClass = block.lang ? ` class="language-${block.lang}"` : '';
        
        // Add as a single readable sentence
        const codePreview = block.code.substring(0, 100).replace(/\n/g, ' ') + '...';
        const speechText = `Code block: ${codePreview}`;
        const idx = sid++;
        sentences.push(speechText);
        
        html += `<div id="sent-${idx}" class="reader-sentence" onclick="clickToRead(${idx})">`;
        html += `<pre class="code-block"><code${langClass}>${escapedCode}</code></pre>`;
        html += '</div>';
      }
      i++;
      continue;
    }

    if (trimmed === '') {
      html += '<div class="reader-divider"></div>';
      i++; continue;
    }

    if (/^#{1,4}\s/.test(trimmed)) {
      const level = trimmed.match(/^(#{1,4})/)[1].length;
      const content = trimmed.replace(/^#{1,4}\s*/, '');
      const size = level === 1 ? '22px' : level === 2 ? '19px' : '17px';
      const idx = sid++;
      sentences.push(cleanSpeech(content));
      html += `<div id="sent-${idx}" class="reader-sentence reader-heading" style="font-size:${size};" onclick="clickToRead(${idx})">${cleanDisplay(content)}</div>`;
      i++; continue;
    }

    if (trimmed.length <= 80 && trimmed === trimmed.toUpperCase() && /[A-Z]/.test(trimmed) && !/[a-z]/.test(trimmed)) {
      const idx = sid++;
      sentences.push(cleanSpeech(trimmed));
      html += `<div id="sent-${idx}" class="reader-sentence reader-heading" style="font-size:17px;letter-spacing:0.5px;" onclick="clickToRead(${idx})">${cleanDisplay(trimmed)}</div>`;
      i++; continue;
    }

    if (/^[A-Z][^.!?]{0,60}:$/.test(trimmed) && !trimmed.includes('|')) {
      const idx = sid++;
      sentences.push(cleanSpeech(trimmed));
      html += `<div id="sent-${idx}" class="reader-sentence reader-heading" style="font-size:16px;" onclick="clickToRead(${idx})">${cleanDisplay(trimmed)}</div>`;
      i++; continue;
    }

    // Table
    if (isTableRow(trimmed)) {
      let tableLines = [];
      while (i < lines.length && (isTableRow(lines[i].trim()) || isTableSep(lines[i].trim()))) {
        tableLines.push(lines[i].trim()); i++;
      }
      let headers = [], dataRows = [], headerDone = false;
      tableLines.forEach(row => {
        if (isTableSep(row)) { headerDone = true; return; }
        const cells = row.split('|').filter(c => c.trim() !== '').map(c => c.trim());
        if (!headerDone) { headers = cells; }
        else { dataRows.push(cells); }
      });
      if (!headerDone && tableLines.length > 1) {
        const allRows = tableLines.map(r => r.split('|').filter(c => c.trim() !== '').map(c => c.trim()));
        headers = allRows[0] || []; dataRows = allRows.slice(1);
      }
      html += '<div class="reader-table-wrap">';
      dataRows.forEach(cells => {
        const speechParts = cells.map((cell, ci) => {
          const hdr = headers[ci] ? cleanSpeech(headers[ci]) : `Column ${ci + 1}`;
          return `${hdr}: ${cleanSpeech(cell)}`;
        });
        const speechText = speechParts.join('. ');
        const idx = sid++;
        sentences.push(speechText);
        html += `<div id="sent-${idx}" class="reader-table-card reader-sentence" onclick="clickToRead(${idx})">`;
        cells.forEach((cell, ci) => {
          const label = headers[ci] ? cleanDisplay(headers[ci]) : `Col ${ci + 1}`;
          html += `<div class="rtc-row"><div class="rtc-label">${label}</div><div class="rtc-value">${cleanDisplay(cell)}</div></div>`;
        });
        html += '</div>';
      });
      html += '</div>';
      continue;
    }

    // Numbered list
    if (/^\d+[\.\)]\s+/.test(trimmed)) {
      html += '<ol style="padding-left:26px;margin:10px 0 14px;">';
      while (i < lines.length && /^\d+[\.\)]\s+/.test(lines[i].trim())) {
        const content = lines[i].trim().replace(/^\d+[\.\)]\s*/, '');
        html += addSentence(content, cleanDisplay(content), 'li', '');
        i++;
      }
      html += '</ol>'; continue;
    }

    // Bullet list
    if (/^[\*\-•·–]\s+/.test(trimmed)) {
      html += '<ul style="padding-left:26px;margin:10px 0 14px;list-style:disc;">';
      while (i < lines.length && /^[\*\-•·–]\s+/.test(lines[i].trim())) {
        const content = lines[i].trim().replace(/^[\*\-•·–]\s*/, '');
        html += addSentence(content, cleanDisplay(content), 'li', '');
        i++;
      }
      html += '</ul>'; continue;
    }

    // Standalone * prefix
    if (/^\*[^*]/.test(trimmed) && !/\*\*/.test(trimmed)) {
      html += '<ul style="padding-left:26px;margin:10px 0 14px;list-style:disc;">';
      while (i < lines.length && /^\*[^*]/.test(lines[i].trim()) && !/^\*\*/.test(lines[i].trim())) {
        const content = lines[i].trim().replace(/^\*\s*/, '');
        html += addSentence(content, cleanDisplay(content), 'li', '');
        i++;
      }
      html += '</ul>'; continue;
    }

    // Regular paragraph
    html += '<p>';
    const displayParts = splitSentences(trimmed);
    if (displayParts.length === 0) {
      html += addSentence(cleanSpeech(trimmed), cleanDisplay(trimmed), 'span', '');
    } else {
      displayParts.forEach(part => {
        html += addSentence(cleanSpeech(part), cleanDisplay(part), 'span', '');
      });
    }
    html += '</p>';
    i++;
  }
  
  return html;
}

function startReadMode() {
  const rawText = document.getElementById('userInput').value;
  if (!rawText) return showToast("⚠️ Paste text first");
  sentences = [];
  const display = document.getElementById('readerTextDisplay');
  display.innerHTML = formatTextToHTML(rawText);
  showScreen('readerScreen');
  currentSentenceIdx = 0;
  initBgMusic();
  playSequence();
}

function clickToRead(idx) {
  synth.cancel();
  isPlaying = false;
  currentSentenceIdx = idx;
  highlightSentence(idx);
  setTimeout(() => playSequence(), 50);
}

function highlightSentence(idx) {
  document.querySelectorAll('.reader-sentence').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`sent-${idx}`);
  if(el) { el.classList.add('active'); el.scrollIntoView({behavior:"smooth",block:"center"}); }
}

function playSequence() {
  if(currentSentenceIdx >= sentences.length) {
    isPlaying = false;
    document.getElementById('playPauseBtn').textContent = '▶';
    musicRise();
    return;
  }
  isPlaying = true;
  document.getElementById('playPauseBtn').textContent = '⏸';
  highlightSentence(currentSentenceIdx);
  const speechText = sentences[currentSentenceIdx];
  const utter = new SpeechSynthesisUtterance(speechText);
  const voice = getReaderVoice();
  if(voice) { utter.voice = voice; utter.lang = voice.lang; }
  utter.rate = readSpeed;
  utter.onstart = () => { musicDuck(); };
  utter.onend = () => {
    if(isPlaying) { currentSentenceIdx++; playSequence(); }
    else { musicRise(); }
  };
  synth.speak(utter);
}

function togglePlay() {
  if(isPlaying) {
    synth.cancel(); isPlaying = false;
    document.getElementById('playPauseBtn').textContent = '▶';
    musicRise();
  } else {
    playSequence();
  }
}

function stopAudio() {
  synth.cancel();
  isPlaying = false;
  stopBgMusic();
}

function copyText() {
  navigator.clipboard.writeText(document.getElementById('userInput').value)
    .then(() => showToast("✅ Copied!"));
}

function strictRepairJSON(text) {
  try { return JSON.parse(text.replace(/```json/g,'').replace(/```/g,'').trim()); } catch(e){}
  const objs = [];
  const regex = /\{[\s\S]*?\}/g; 
  let m;
  while((m = regex.exec(text)) !== null) {
    try { 
      let clean = m[0].replace(/,\s*}/g, '}');
      objs.push(JSON.parse(clean)); 
    } catch(e){}
  }
  return objs;
}

async function startGeneration() {
  const text = document.getElementById('userInput').value;
  if(text.length < 50) return showToast("⚠️ Need more text");
  quizData = [];
  quizAnswered = {};
  currentQuizPage = 0;
  quizStats = { total: 0, correct: 0, startTime: Date.now(), timerInterval: null, paused: false };
  document.getElementById('quizContainer').innerHTML = '';
  startTimer();
  updateScore();
  showScreen('quizScreen');
  await loadMoreQuestions();
}

async function loadMoreQuestions() {
  const fullText = document.getElementById('userInput').value;
  quizStats.paused = true;
  toggleLoader(true, "AI Analyzing...", "Generating Questions...");

  try {
    let contextText = fullText;
    if(fullText.length > 3000) {
      const start = Math.floor(Math.random() * (fullText.length - 2500));
      contextText = fullText.substring(start, start + 2500);
    }

    const prompt = `
Act as a Professor setting a rigorous University Final Exam.
Generate: 8 Objective (MCQ), 5 Subjective (Fill-in), 2 Theory, 2 MindGame.

═══ CRITICAL RULES ═══

OBJECTIVE (type:"objective"):
- Questions must be TRICKY with plausible distractors that are hard to eliminate.
- 4 options as FULL sentence/phrase (NO "A.", "B." prefixes).
- answer field: Copy the EXACT full text of the correct option.
- explanation: WHY it is correct in 1-2 sentences.
- AVOID making the correct answer visually obvious (don't make it the longest, most formal, or most specific-sounding option). All 4 options should look equally plausible at first glance.

SUBJECTIVE (type:"subjective"):
- Questions that test recall of specific facts, names, definitions, or lists from the text.
- CRITICAL: If the question could have MORE THAN ONE valid correct answer from the notes (e.g. "name one of the four types of X"), the answer field MUST include ALL valid answers separated by | (pipe symbol). Example: "aspirin|ibuprofen|naproxen|diclofenac"
- If only ONE answer is correct (a definition, a specific value, a single concept), just provide that one answer.
- Each individual answer: max 5 words.
- NO parentheses, NO abbreviations with full forms together — pick ONE consistent form per answer.
- Spelling must exactly match how it appears in the notes.

THEORY (type:"theory"):
- Deep conceptual questions requiring detailed explanations.
- answer: structured with numbered points.

MINDGAME (type:"mindgame"):
- Create 2 IQ-enhancing questions derived from the content that require ACTIVE THINKING, not just recall.
- Types: analogies (A:B::C:?), sequencing challenges, cause-effect reasoning, pattern completion.
- Example: "Drug A requires 200mg IV to achieve effect. Drug B has F=0.5. What oral dose of Drug B achieves the same systemic exposure?" 
- 4 options, exact answer text in answer field.
- explanation: Show the reasoning steps.

Schema (return ONLY valid JSON array, no markdown):
[
  {"type":"objective","question":"...","options":["Full text A","Full text B","Full text C","Full text D"],"answer":"Full text A","explanation":"..."},
  {"type":"subjective","question":"...","answer":"answer1|answer2|answer3"},
  {"type":"theory","question":"...","answer":"1. Point one\\n2. Point two\\n3. Point three"},
  {"type":"mindgame","question":"...","options":["A","B","C","D"],"answer":"A","explanation":"..."}
]

TEXT: ${contextText.replace(/[^\x20-\x7E\n]/g, '')}
    `;

    const res = await puter.ai.chat(prompt);
    let newQs = strictRepairJSON(res?.message?.content || res);
    
    if (newQs && newQs.length) {
      const prevLen = quizData.length;
      newQs.forEach(q => {
        if (q.type === 'objective' || q.type === 'mindgame') {
          if (!q.options || q.options.length < 4) {
            q.type = 'subjective';
          } else {
            const ansNorm = normalize(q.answer || '');
            const letterMap = { a:0, b:1, c:2, d:3 };
            let resolved = q.options.find(opt => normalize(opt) === ansNorm);
            if (!resolved) {
              const letter = ansNorm.replace(/[^a-d]/g, '').charAt(0);
              if (letter && letterMap[letter] !== undefined) resolved = q.options[letterMap[letter]];
            }
            if (!resolved) resolved = q.options.find(opt => smartMatch(ansNorm, normalize(opt)));
            if (resolved) q.answer = resolved;
            q.options = shuffleArray(q.options);
          }
        }
        // Ensure subjective answers are pipe-separated properly
        if (q.type === 'subjective' && q.answer) {
          q.answer = q.answer.split('|').map(a => a.trim()).filter(Boolean).join('|');
        }
      });

      quizData = [...quizData, ...newQs];
      
      // Navigate to first new question
      currentQuizPage = prevLen;
      renderSingleQuestion(currentQuizPage);
      showToast(`✅ ${newQs.length} questions added!`);
    } else { 
      throw new Error("Invalid"); 
    }

  } catch(e) {
    showToast("⚠️ AI Busy. Retrying...");
  } finally {
    toggleLoader(false);
    quizStats.paused = false;
  }
}

// ─── Paginated Quiz Rendering ───
function renderSingleQuestion(idx) {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  if (idx < 0 || idx >= quizData.length) {
    updateQuizNav();
    return;
  }
  const q = quizData[idx];
  const answered = quizAnswered[idx];
  const div = document.createElement('div');
  div.className = 'q-card';

  // Tag label
  const tagClass = q.type === 'objective' ? 'obj' : q.type === 'subjective' ? 'sub' : q.type === 'mindgame' ? 'min' : 'thy';
  const tagLabel = q.type === 'mindgame' ? '🧠 MIND GAME' : q.type.toUpperCase();

  const qSpeechText = cleanSpeech(q.question).replace(/'/g, "\\'");

  let inner = `
    <div class="q-tag ${tagClass}">${tagLabel}</div>
    <div class="q-header">
      <div class="q-speak" onclick="speakQuestionText('${qSpeechText}')">🔊</div>
      <div class="q-text">${cleanDisplay(q.question)}</div>
    </div>
  `;

  if (q.type === 'objective' || q.type === 'mindgame') {
    // Pre-compute the single correct option index (exact match only for display)
    let correctOptIdx = q.options.findIndex(opt => normalize(opt) === normalize(q.answer));
    if (correctOptIdx === -1) {
      // fallback: best word score, single winner only
      let bestScore = 0, bestIdx = -1;
      q.options.forEach((opt, i) => {
        const s = wordMatchScore(opt, q.answer);
        if (s > bestScore) { bestScore = s; bestIdx = i; }
      });
      if (bestScore >= 0.60) correctOptIdx = bestIdx;
    }

    q.options.forEach((opt, optIdx) => {
      let savedClass = '';
      if (answered) {
        if (optIdx === answered.selectedOptIdx) {
          savedClass = answered.isCorrect ? ' correct' : ' wrong';
        } else if (!answered.isCorrect && optIdx === correctOptIdx) {
          savedClass = ' correct'; // highlight the ONE correct option
        }
      }
      inner += `<button class="opt-btn${savedClass}" ${answered?'disabled':''} onclick="handleObjClick(${idx}, ${optIdx})">${cleanDisplay(opt)}</button>`;
    });
    inner += `<div class="reveal-box ${answered?'show':''}" id="rev-${idx}">`;
    if (answered) {
      inner += formatReveal(q.explanation || (answered.isCorrect ? 'Well done!' : `Correct answer: ${cleanDisplay(q.answer)}`));
    }
    inner += `</div>`;
  } 
  else if (q.type === 'subjective') {
    const allAnswers = (q.answer || '').split('|').map(a => a.trim()).filter(Boolean);
    const borderColor = answered ? (answered.isCorrect ? 'var(--green)' : 'var(--red)') : 'var(--border)';
    const textColor = answered ? (answered.isCorrect ? 'var(--green)' : 'var(--red)') : 'var(--text)';
    inner += `<input type="text" class="opt-btn" id="sub-input-${idx}" 
      placeholder="Type your answer here..." 
      style="cursor:text;border-color:${borderColor};color:${textColor};" 
      value="${answered ? (answered.userAnswer||'') : ''}"
      ${answered?'disabled':''}/>`;
    inner += `<button class="opt-btn sub-submit-btn" id="sub-btn-${idx}" 
      onclick="handleSubAnswer(document.getElementById('sub-input-${idx}'), ${idx})" 
      style="text-align:center;border-color:var(--blue);color:var(--blue);margin-top:2px;"
      ${answered?'disabled':''}>✅ Submit Answer</button>`;
    inner += `<div class="reveal-box ${answered?'show':''}" id="rev-${idx}">`;
    if (answered) {
      const label = answered.isCorrect ? '✅ Correct!' : '📖 Correct Answer(s):';
      const revealText = allAnswers.length > 1 ? allAnswers.join(' | ') : allAnswers[0];
      inner += `<div style="font-weight:700;color:${answered.isCorrect?'var(--green)':'var(--gold)'};margin-bottom:6px;">${label}</div>${formatReveal(revealText)}`;
    }
    inner += `</div>`;
  }
  else { // theory
    inner += `<button class="opt-btn" style="text-align:center;border-color:var(--purple);color:var(--purple)" onclick="handleThyReveal(${idx})">👁 Reveal Answer</button>`;
    inner += `<div class="reveal-box ${answered&&answered.revealed?'show':''}" id="rev-${idx}">`;
    if (answered && answered.revealed) {
      inner += formatReveal(q.answer);
    } else {
      inner += formatReveal(q.answer); // pre-populate but hidden until .show
    }
    inner += `</div>`;
  }

  div.innerHTML = inner;
  container.appendChild(div);
  updateQuizNav();
  // Scroll to very top so the question is immediately visible
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateQuizNav() {
  const total = quizData.length;
  const pg = currentQuizPage;
  document.getElementById('qProgress').textContent = total ? `${pg + 1} / ${total}` : '— / —';
  document.getElementById('prevQBtn').disabled = pg <= 0;
  const isLast = pg >= total - 1;
  const nextBtn = document.getElementById('nextQBtn');
  const moreBtn = document.getElementById('loadMoreBtn');
  if (nextBtn) nextBtn.style.display = isLast ? 'none' : '';
  if (moreBtn) moreBtn.style.display = isLast ? '' : 'none';
}

function nextQuestion() {
  if (currentQuizPage < quizData.length - 1) {
    currentQuizPage++;
    renderSingleQuestion(currentQuizPage);
  }
}

function prevQuestion() {
  if (currentQuizPage > 0) {
    currentQuizPage--;
    renderSingleQuestion(currentQuizPage);
  }
}

// ─── Answer Handlers ───
function handleObjClick(qIdx, optIdx) {
  const q = quizData[qIdx];
  if (!q || quizAnswered[qIdx]) return;
  const selectedText = q.options[optIdx];
  const correctText  = q.answer;

  // Step 1: Find the correct option index using STRICT exact match first
  // This prevents smartMatch from wrongly identifying similar-sounding options as correct
  let correctOptIdx = q.options.findIndex(opt => normalize(opt) === normalize(correctText));

  // Step 2: If no exact match, use smartMatch ONCE to find the single BEST matching option
  if (correctOptIdx === -1) {
    let bestScore = 0, bestIdx = -1;
    q.options.forEach((opt, i) => {
      const score = wordMatchScore(opt, correctText);
      if (score > bestScore) { bestScore = score; bestIdx = i; }
    });
    // Only accept if clearly dominant (threshold 0.60)
    if (bestScore >= 0.60) correctOptIdx = bestIdx;
  }

  // Step 3: Determine if the selected option is correct
  const isCorrect = correctOptIdx !== -1
    ? optIdx === correctOptIdx
    : smartMatch(selectedText, correctText); // fallback only if answer not among options

  quizAnswered[qIdx] = { isCorrect, selectedOptIdx: optIdx };
  quizStats.total++;
  if (isCorrect) quizStats.correct++;
  updateScore();

  // Step 4: Visuals — disable ALL buttons, colour ONLY the selected and the ONE correct
  const container = document.getElementById('quizContainer');
  const buttons = container.querySelectorAll('button.opt-btn');
  buttons.forEach(b => b.disabled = true);
  buttons[optIdx].classList.add(isCorrect ? 'correct' : 'wrong');

  // Show correct answer in green — strictly ONE button
  if (!isCorrect && correctOptIdx !== -1 && correctOptIdx !== optIdx) {
    buttons[correctOptIdx].classList.add('correct');
  }

  const explain = q.explanation || (isCorrect ? 'Well done!' : `Correct answer: ${correctText}`);
  const reveal = document.getElementById(`rev-${qIdx}`);
  reveal.innerHTML = formatReveal(explain);
  reveal.classList.add('show');

  speakText(isCorrect
    ? `Correct! ${cleanSpeech(q.explanation || '')}`
    : `Incorrect. The answer is ${cleanSpeech(correctText)}. ${cleanSpeech(q.explanation || '')}`
  );

  updateQuizNav();
}

function handleSubAnswer(input, qIdx) {
  if (input.disabled) return;
  const q = quizData[qIdx];
  if (!q || quizAnswered[qIdx]) return;

  const allAnswers = (q.answer || '').split('|').map(a => a.trim()).filter(Boolean);
  const isCorrect = matchesAnyAnswer(input.value, q.answer);

  quizAnswered[qIdx] = { isCorrect, userAnswer: input.value };
  quizStats.total++;
  if (isCorrect) quizStats.correct++;
  updateScore();

  input.disabled = true;
  input.style.borderColor = isCorrect ? 'var(--green)' : 'var(--red)';
  input.style.color = isCorrect ? 'var(--green)' : 'var(--red)';
  const submitBtn = document.getElementById(`sub-btn-${qIdx}`);
  if (submitBtn) submitBtn.disabled = true;

  const revealText = allAnswers.length > 1 ? allAnswers.join(' | ') : allAnswers[0];
  const reveal = document.getElementById(`rev-${qIdx}`);
  const label = isCorrect ? '✅ Correct!' : '📖 Correct Answer(s):';
  reveal.innerHTML = `<div style="font-weight:700;color:${isCorrect?'var(--green)':'var(--gold)'};margin-bottom:6px;">${label}</div>${formatReveal(revealText)}`;
  reveal.classList.add('show');

  if (isCorrect) {
    speakText(`Correct! The answer is ${cleanSpeech(allAnswers[0])}`);
  } else {
    const spoken = allAnswers.length > 1
      ? `Incorrect. The correct answers are: ${allAnswers.map(a => cleanSpeech(a)).join(', or ')}`
      : `Incorrect. The correct answer is ${cleanSpeech(allAnswers[0])}`;
    speakText(spoken);
  }

  updateQuizNav();
}

function handleThyReveal(idx) {
  const q = quizData[idx];
  if (!q) return;
  quizAnswered[idx] = quizAnswered[idx] || {};
  quizAnswered[idx].revealed = true;
  const reveal = document.getElementById(`rev-${idx}`);
  reveal.innerHTML = formatReveal(q.answer);
  reveal.classList.add('show');
  speakText(cleanSpeech(q.answer));
}

// ─── Timer & Score ───
function startTimer() {
  if(quizStats.timerInterval) clearInterval(quizStats.timerInterval);
  quizStats.startTime = Date.now();
  quizStats.timerInterval = setInterval(() => {
    if(!quizStats.paused) {
      const d = Math.floor((Date.now() - quizStats.startTime)/1000);
      const m = Math.floor(d/60).toString().padStart(2,'0');
      const s = (d%60).toString().padStart(2,'0');
      document.getElementById('timerDisplay').innerText = `⏱ ${m}:${s}`;
    } else { quizStats.startTime += 1000; }
  }, 1000);
}

function updateScore() {
  const p = quizStats.total===0?0:Math.round((quizStats.correct/quizStats.total)*100);
  document.getElementById('scoreDisplay').innerText = `★ ${p}%`;
}

function stopQuiz() {
  clearInterval(quizStats.timerInterval);
  synth.cancel();
  stopBgMusic();
  showScreen('uploadScreen');
}

// ─── Loader & Toast ───
function toggleLoader(show, title, sub) {
  const el = document.getElementById('loaderOverlay');
  if(show) {
    el.classList.add('active');
    document.getElementById('loaderTitle').innerText = title || 'Loading...';
    document.getElementById('loaderSub').innerText = sub || '';

    el.classList.remove('active');
  }

function showToast(msg) {
  const t = document.getElementById('toastBox');

}


// ═══════════════════════════════════════════════
//   READ DOC — 3-TIER PIPELINE
//   Tier 1: PDF.js text-layer extraction
//   Tier 2: Tesseract OCR (canvas render per page)
//   Tier 3: Claude Vision API (handwriting fallback)
// ═══════════════════════════════════════════════
let _docReadCancelled = false;

function cancelDocRead() {
  _docReadCancelled = true;
  document.getElementById('docProgressOverlay').classList.remove('active');
  document.getElementById('docInput').value = '';
}

function setDocProgress(pct, title, sub, icon) {
  document.getElementById('docProgressBar').style.width = Math.min(100, pct) + '%';
  if (title) document.getElementById('docProgressTitle').textContent = title;
  if (sub)   document.getElementById('docProgressSub').textContent = sub;
  if (icon)  document.getElementById('docProgressIcon').textContent = icon;
}

function setStage(stageId, state) { // state: 'active' | 'done' | 'error' | ''
  const el = document.getElementById('stage-' + stageId);
  if (!el) return;
  el.className = 'doc-stage-pill' + (state ? ' ' + state : '');
}

// ── Render a PDF page to a canvas and return base64 image ──
async function renderPageToBase64(pdf, pageNum, scale) {
  const page = await pdf.getPage(pageNum);
  const viewport = page.getViewport({ scale: scale || 2.5 }); // 2.5× for crisp OCR
  const canvas = document.createElement('canvas');
  canvas.width  = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;
  return canvas.toDataURL('image/png').split(',')[1]; // base64 only
}

// ── TIER 2: Tesseract OCR ──────────────────────
async function tier2_tesseractOCR(pdf, totalPages) {
  if (typeof Tesseract === 'undefined') throw new Error('Tesseract not loaded');
  let fullText = '';
  let totalConf = 0, confCount = 0;
  for (let p = 1; p <= totalPages; p++) {
    if (_docReadCancelled) return { text: null, avgConf: 0 };
    setDocProgress(
      Math.round(40 + (p / totalPages) * 35),
      'OCR Scanning...',
      `Scanning page ${p} of ${totalPages}...`, '🔍'
    );
    const page = await pdf.getPage(p);
    const viewport = page.getViewport({ scale: 2.5 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

    const { data } = await Tesseract.recognize(canvas, 'eng', {
      logger: () => {},
      tessedit_pageseg_mode: '1',       // Auto page seg with OSD
      preserve_interword_spaces: '1',
    });
    totalConf += (data.confidence || 0);
    confCount++;
    fullText += (data.text || '').trim() + '\n\n';
  }
  const avgConf = confCount > 0 ? totalConf / confCount : 0;
  return { text: fullText, avgConf };
}

// ── TIER 3: Claude Vision API ──────────────────
async function tier3_claudeVision(pdf, totalPages) {
  let fullText = '';
  const BATCH = 2; // process 2 pages per API call to stay within limits
  for (let p = 1; p <= totalPages; p += BATCH) {
    if (_docReadCancelled) return null;
    const end = Math.min(p + BATCH - 1, totalPages);
    setDocProgress(
      Math.round(78 + ((p - 1) / totalPages) * 18),
      'AI Reading Handwriting...',
      `Pages ${p}–${end} of ${totalPages}`, '🧠'
    );

    // Build content blocks — one image per page in the batch
    const contentBlocks = [];
    for (let pp = p; pp <= end; pp++) {
      const b64 = await renderPageToBase64(pdf, pp, 2.5);
      contentBlocks.push({
        type: 'image',
        source: { type: 'base64', media_type: 'image/png', data: b64 }
      });
      contentBlocks.push({
        type: 'text',
        text: pp === p ? `Please transcribe ALL text from these ${end - p + 1} page(s) of a handwritten/scanned document exactly as written. Preserve structure — headings, bullet points, numbered lists, equations, chemical formulas. Output only the transcribed text, no commentary.` : ''
      });
    }
    // Remove empty text blocks
    const blocks = contentBlocks.filter(b => !(b.type === 'text' && !b.text));

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2000,
          messages: [{ role: 'user', content: blocks }]
        })
      });
      const data = await response.json();
      const pageText = (data.content || [])
        .filter(c => c.type === 'text').map(c => c.text).join('\n');
      fullText += pageText.trim() + '\n\n';
    } catch (e) {
      console.warn('[Tier3] API call failed for page batch', p, e);
      // Continue — partial text is better than nothing
    }
    // Small breathing room between API calls
    await new Promise(r => setTimeout(r, 300));
  }
  return fullText;
}

// ── MAIN PDF extraction orchestrator ──────────
async function extractPDFText(file) {
  if (typeof pdfjsLib === 'undefined') throw new Error('PDF.js not loaded');
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const totalPages = pdf.numPages;

  // ── TIER 2 — Tesseract OCR (start here always) ──
  setStage('extract', 'done'); // skip tier 1
  setStage('ocr', 'active'); setStage('ai', '');
  setDocProgress(5, 'OCR Scanning...', 'Preparing scanner...', '🔍');

  let t2Text = '', t2Conf = 0;
  try {
    const t2Result = await tier2_tesseractOCR(pdf, totalPages);
    if (_docReadCancelled) return '';
    t2Text = t2Result.text || '';
    t2Conf = t2Result.avgConf;
  } catch(e) {
    console.warn('[Tier2] Tesseract failed:', e);
    setStage('ocr', 'error');
  }

  const avgT2CharsPerPage = t2Text.trim().length / totalPages;
  const t2Good = t2Conf >= 55 && avgT2CharsPerPage >= 60;

  if (t2Good) {
    setStage('ocr', 'done');
    setDocProgress(100, 'Done!', `OCR complete (confidence: ${Math.round(t2Conf)}%)`, '✅');
    return t2Text;
  }

  // ── TIER 3 — Claude Vision ──
  setStage('ocr', 'error');
  setStage('ai', 'active');
  setDocProgress(76, 'OCR confidence low, using AI Vision...', 'Sending to Claude AI...', '🧠');

  const t3Text = await tier3_claudeVision(pdf, totalPages);
  if (_docReadCancelled) return '';

  const finalText = (t3Text && t3Text.trim().length > 50)
    ? t3Text
    : (t2Text && t2Text.trim().length > 50) ? t2Text : '';

  if (finalText) {
    setStage('ai', 'done');
    setDocProgress(100, 'Done!', 'AI Vision transcription complete', '✅');
    return finalText;
  }

  setStage('ai', 'error');
  throw new Error('All extraction methods exhausted — document may be encrypted or image-only without readable content.');
}

async function handleDocUpload(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const name = file.name.toLowerCase();
  _docReadCancelled = false;

  document.getElementById('docProgressOverlay').classList.add('active');
  // Reset stage pills
  ['extract','ocr','ai'].forEach(s => setStage(s, ''));
  setDocProgress(3, 'Opening Document...', file.name, '📄');

  try {
    let extractedText = '';

    if (name.endsWith('.txt') || name.endsWith('.md')) {
      setDocProgress(40, 'Reading Text File...', 'Loading...', '📝');
      extractedText = await file.text();
      setDocProgress(100, 'Done!', '', '✅');

    } else if (name.endsWith('.pdf')) {
      extractedText = await extractPDFText(file);

    } else if (name.endsWith('.docx') || name.endsWith('.doc')) {
      setDocProgress(20, 'Parsing Word Document...', 'Extracting content...', '📝');
      const arrayBuffer = await file.arrayBuffer();
      if (_docReadCancelled) return;
      setDocProgress(60, 'Converting DOCX...', 'Processing paragraphs...', '📝');
      const result = await mammoth.extractRawText({ arrayBuffer });
      extractedText = result.value || '';
      setDocProgress(100, 'Done!', '', '✅');

    } else {
      extractedText = await file.text();
      setDocProgress(100, 'Done!', '', '✅');
    }

    if (_docReadCancelled) return;
    if (!extractedText || !extractedText.trim()) {
      document.getElementById('docProgressOverlay').classList.remove('active');
      showToast('⚠️ Could not extract text — file may be empty or encrypted');
      input.value = '';
      return;
    }

    await new Promise(r => setTimeout(r, 500));
    document.getElementById('docProgressOverlay').classList.remove('active');
    input.value = '';
    launchReaderWithText(extractedText.trim(), file.name);

  } catch (err) {
    document.getElementById('docProgressOverlay').classList.remove('active');
    input.value = '';
    showToast('❌ ' + (err.message || 'Could not read file'));
    console.error('[ReadDoc]', err);
  }
}

function launchReaderWithText(text, docName) {
  // Populate the reader exactly like startReadMode but from doc text
  sentences = [];
  const display = document.getElementById('readerTextDisplay');

  // Update the back button header to show doc name
  const topBar = document.querySelector('#readerScreen .reader-top');
  if (topBar) {
    const backBtn = topBar.querySelector('.back-btn');
    if (backBtn) backBtn.textContent = '← ' + (docName ? docName.replace(/\.[^.]+$/, '') : 'Doc');
    // Restore back button click to also clear doc state
    backBtn.onclick = function() { stopAudio(); showScreen('uploadScreen'); };
  }

  display.innerHTML = formatTextToHTML(text);
  showScreen('readerScreen');
  currentSentenceIdx = 0;
  initBgMusic();
  playSequence();
}
