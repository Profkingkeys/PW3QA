<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  
  <!-- Android TTS Bridge
     Only activates inside an Android WebView APK (window.Android present).
     In normal browser: the guard "if (!window.Android) return" exits immediately,
     leaving window.speechSynthesis 100% untouched — no wrapping, no risk.
     window.Android is registered by Java addJavascriptInterface() before loadUrl(),
     so it is available the moment this script executes.

     HOW TO USE:
     Paste this <script> block inside your <head> tag, BEFORE any other
     <script> tags and BEFORE your app's own JS files. That way when your
     app does:  let synth = window.speechSynthesis
     it captures the working bridge instead of the broken silent WebView engine.
-->
<script>
(function () {
  // ── BROWSER FAST-EXIT ─────────────────────────────────────────────
  // If window.Android is not present, we are in a normal browser.
  // Native speechSynthesis works perfectly there — do NOT touch it.
  if (!window.Android) return;

  // ── WEBVIEW APK PATH BELOW ────────────────────────────────────────
  if (window._pw5tts) return;
  window._pw5tts = true;

  var FAKE_VOICES = [
    { name: 'Android TTS',        lang: 'en-US', default: true,  localService: true, voiceURI: 'android-tts'    },
    { name: 'Android TTS Female', lang: 'en-US', default: false, localService: true, voiceURI: 'android-female' },
    { name: 'Android TTS GB',     lang: 'en-GB', default: false, localService: true, voiceURI: 'android-gb'     }
  ];

  var _vcListeners = [];
  var _onVCProp    = null;
  var _currentUtt  = null;
  var _endTimer    = null;
  var _pendingUtt  = null;

  // Replace SpeechSynthesisUtterance with a plain object.
  // WebView's native SpeechSynthesisUtterance is broken — this one works
  // as a plain data carrier that our bridge reads and passes to Java.
  window.SpeechSynthesisUtterance = function (text) {
    this.text    = text || '';
    this.rate    = 1.0;
    this.pitch   = 1.0;
    this.volume  = 1.0;
    this.lang    = 'en-US';
    this.voice   = null;
    this.onstart = null;
    this.onend   = null;
    this.onerror = null;
  };

  function _bridgeSpeak(utt) {
    var b    = window.Android;
    var text = String(utt.text || '').trim();
    if (!text) {
      if (utt.onend) try { utt.onend({ type: 'end' }); } catch (e) {}
      return;
    }
    try {
      if (b.speakWithOptions) b.speakWithOptions(text, parseFloat(utt.rate) || 1.0, parseFloat(utt.pitch) || 1.0);
      else if (b.speakTTS)    b.speakTTS(text);
    } catch (e) {
      console.warn('[PW3-TTS] Android bridge call failed:', e);
    }
  }

  // Safety net: fires onend if Java never calls _onTTSDone
  function _startFallbackTimer(utt) {
    if (_endTimer) clearTimeout(_endTimer);
    var words = String(utt.text).trim().split(/\s+/).length;
    var wpm   = 150 * Math.max(0.5, parseFloat(utt.rate) || 1.0);
    var ms    = Math.max(2000, (words / wpm) * 60000 + 1500);
    _endTimer = setTimeout(function () {
      if (_currentUtt === utt) {
        _synth.speaking = false;
        _currentUtt     = null;
        if (utt.onend) try { utt.onend({ type: 'end' }); } catch (e) {}
      }
    }, ms);
  }

  var _synth = {
    speaking : false,
    paused   : false,
    pending  : false,

    speak: function (utt) {
      if (!utt) return;
      var clean = String(utt.text || '')
        .replace(/\[.*?\]/g, '')
        .replace(/[*#`_~]/g, '')
        .trim();
      if (!clean) {
        if (utt.onend) try { utt.onend({ type: 'end' }); } catch (e) {}
        return;
      }
      utt.text  = clean;
      utt.voice = null; // Android picks from its own engine

      _pendingUtt   = null;
      _currentUtt   = utt;
      this.speaking = true;

      // Fire onstart immediately so word-by-word caption timers begin
      // at the same moment Java starts speaking
      if (utt.onstart) try { utt.onstart({ type: 'start' }); } catch (e) {}

      _bridgeSpeak(utt);
      _startFallbackTimer(utt);
    },

    cancel: function () {
      this.speaking = false;
      _currentUtt   = null;
      _pendingUtt   = null;
      if (_endTimer) { clearTimeout(_endTimer); _endTimer = null; }
      var b = window.Android;
      if (b && b.stopSpeaking) try { b.stopSpeaking(); } catch (e) {}
    },

    pause:  function () { this.paused = true;  },
    resume: function () { this.paused = false; },

    getVoices: function () {
      var b = window.Android;
      if (b && b.getVoices) {
        try { var v = JSON.parse(b.getVoices()); if (v && v.length) return v; } catch (e) {}
      }
      return FAKE_VOICES;
    },

    addEventListener: function (evt, fn) {
      if (evt === 'voiceschanged') {
        if (_vcListeners.indexOf(fn) === -1) _vcListeners.push(fn);
        setTimeout(fn, 0); // fire immediately so app doesn't stall on getVoices()
      }
    },

    removeEventListener: function (evt, fn) {
      if (evt === 'voiceschanged')
        _vcListeners = _vcListeners.filter(function (f) { return f !== fn; });
    }
  };

  try {
    Object.defineProperty(_synth, 'onvoiceschanged', {
      get: function ()   { return _onVCProp; },
      set: function (fn) {
        _onVCProp = fn;
        if (fn) {
          if (_vcListeners.indexOf(fn) === -1) _vcListeners.push(fn);
          setTimeout(fn, 0);
        }
      },
      configurable: true
    });
  } catch (e) {}

  window.speechSynthesis = _synth;

  // ── Callbacks that Java/Kotlin calls back into JS ─────────────────

  // Java UtteranceProgressListener.onDone() → fires your app's utterance.onend
  window._onTTSDone = function () {
    _synth.speaking = false;
    if (_endTimer) { clearTimeout(_endTimer); _endTimer = null; }
    var utt = _currentUtt;
    _currentUtt = null;
    if (utt && utt.onend) try { utt.onend({ type: 'end' }); } catch (e) {}
  };

  // Java TTS engine onInit → flush any speech queued before engine was ready
  window._fireTTSReady = function () {
    _vcListeners.forEach(function (fn) { try { fn(); } catch (e) {} });
    if (_pendingUtt) {
      var utt = _pendingUtt;
      _pendingUtt = null;
      _synth.speak(utt);
    }
  };

  // Optional helper — call from anywhere: nativeSpeak("Hello", 1.0, 1.0)
  window.nativeSpeak = function (text, rate, pitch) {
    var utt   = new window.SpeechSynthesisUtterance(text);
    utt.rate  = rate  || 1.0;
    utt.pitch = pitch || 1.0;
    _synth.speak(utt);
  };

})();
</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prof Kingkeys Academy: Master</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://js.puter.com/v2/"></script>
<script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
<style>
:root{
  --bg:#050507; --bg2:#0a0c12; --panel:#111420; --panel2:#1a1e2e;
  --border:#252a3d; --gold:#f0b429; --gold2:#ffd166; 
  --blue:#4d9eff; --green:#22d37a; --red:#ff4d4d; --purple:#c084fc;
  --white:#e4e6eb; --text:#9aa5c4;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif; overflow-x:hidden;}

/* ═══════ UPLOAD SCREEN ═══════ */
#uploadScreen{
  align-items:center;justify-content:center;padding:20px; min-height:100vh;
  background: radial-gradient(circle at 50% 10%, rgba(77,158,255,0.08), transparent 70%);
}
.upload-box{width:100%;max-width:800px;animation:fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.brand-header{text-align:center;margin-bottom:24px;}
.brand-crown{font-size:54px;display:inline-block;animation:float 4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.brand-title{
  font-size:clamp(24px, 5vw, 42px); font-weight:800; letter-spacing:-1px;
  background:linear-gradient(135deg, var(--gold2), var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.input-area{
  background:var(--panel);border:1px solid var(--border);border-radius:20px;
  padding:8px; position:relative; box-shadow:0 20px 40px rgba(0,0,0,0.3);
}
textarea#userInput{
  width:100%;min-height:350px;background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;padding:24px; padding-bottom:70px;
  font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--white);
  resize:vertical;outline:none;line-height:1.7; transition:border 0.3s;
}
textarea#userInput:focus{border-color:var(--blue);}

/* TOOLS */
.tools-row{
  position:absolute; bottom:20px; right:20px; display:flex; gap:10px;
}
.tool-btn{
  background:var(--panel2); border:1px solid var(--border); color:var(--text);
  padding:12px 18px; border-radius:12px; font-size:13px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; gap:8px; transition:all 0.2s;
}
.tool-btn:active{transform:scale(0.95);}
.tool-btn.camera{border-color:var(--gold); color:var(--gold);}

.action-row{display:flex;gap:12px;margin-top:24px;}
.btn-main{
  flex:1;padding:20px;border-radius:16px;border:none;cursor:pointer;
  font-family:'Sora',sans-serif;font-size:16px;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:10px; transition:all 0.2s;
}
.btn-gen{background:var(--gold);color:#000;box-shadow:0 8px 24px rgba(240,180,41,0.25);}
.btn-gen:active{transform:scale(0.98);}
.btn-read{background:var(--panel2);border:1px solid var(--border);color:var(--white);}

/* ═══════ READER ═══════ */
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

#readerScreen{background:var(--bg);}
.reader-top{
  padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);background:rgba(17,20,32,0.95);
  backdrop-filter:blur(10px); position:sticky;top:0;z-index:50;
}
.back-btn{background:none; border:none; color:var(--text); font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px; font-size:14px;}

.reader-content{
  flex:1;padding:30px 16px 140px 16px;max-width:800px;margin:0 auto;width:100%;
  line-height:2.2;font-size:18px;color:var(--text);
  overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
.reader-sentence{
  padding:3px 5px; border-radius:6px; cursor: pointer; display:inline;
  margin-right: 3px; border:1px solid transparent; line-height:2;
}
.reader-sentence.active{
  background:rgba(240,180,41,0.15); color:var(--white);
  border-color:rgba(240,180,41,0.3); box-shadow: 0 0 15px rgba(240,180,41,0.1);
}
/* Reader structured content */
.reader-content p{margin-bottom:14px;line-height:2.2;word-break:break-word;}
.reader-content ol,.reader-content ul{padding-left:26px;margin:10px 0 14px;}
.reader-content li{margin-bottom:9px;line-height:1.9;word-break:break-word;}
.reader-content li.reader-sentence{display:list-item;}
.reader-heading{font-weight:800;color:var(--gold);margin:20px 0 8px;line-height:1.4;word-break:break-word;}
/* ── Table: stacked card layout — mobile-safe ── */
.reader-table-wrap{
  width:100%;max-width:100%;margin:16px 0;display:flex;flex-direction:column;gap:10px;
}
/* Column header banner above each table group */
.reader-table-header-bar{
  display:flex;width:100%;border-radius:10px 10px 0 0;overflow:hidden;
  border:1px solid var(--border);border-bottom:none;
}
.reader-table-header-bar span{
  flex:1;background:var(--panel2);color:var(--gold);
  font-weight:700;font-size:11px;padding:8px 10px;
  text-transform:uppercase;letter-spacing:0.3px;
  border-right:1px solid var(--border);line-height:1.4;
}
.reader-table-header-bar span:last-child{border-right:none;}
/* Each data row = a card */
.reader-table-card{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;cursor:pointer;transition:border-color 0.2s;width:100%;
}
.reader-table-card.reader-sentence.active{
  border-color:rgba(240,180,41,0.6);
  background:rgba(240,180,41,0.07);
}
.reader-table-card:active{opacity:0.75;}
/* Each cell inside a card = one row of label + value */
.rtc-row{
  display:flex;align-items:flex-start;
  border-bottom:1px solid var(--border);padding:9px 13px;gap:10px;
}
.rtc-row:last-child{border-bottom:none;}
.rtc-label{
  min-width:105px;max-width:115px;font-size:11px;font-weight:700;
  color:var(--gold);line-height:1.5;padding-top:1px;flex-shrink:0;
  text-transform:uppercase;letter-spacing:0.2px;word-break:break-word;
}
.rtc-value{
  font-size:13px;color:var(--white);line-height:1.6;
  word-break:break-word;flex:1;
}
.reader-divider{height:1px;background:var(--border);margin:16px 0;}

.player-dock{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:rgba(17,20,32,0.95);backdrop-filter:blur(12px);
  border:1px solid var(--border);padding:10px 24px;border-radius:50px;
  display:flex;align-items:center;gap:20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.6); z-index:100;
}
.p-btn-lg{
  width:64px;height:64px;border-radius:50%;
  font-size:24px;background:var(--gold);color:#050507;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* ═══════ QUIZ ═══════ */
#quizScreen{background:var(--bg);}
.quiz-dash{
  padding:15px 20px;background:rgba(17,20,32,0.95);border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;z-index:40; backdrop-filter:blur(10px);
}
.stats-group{display:flex;gap:10px;}
.stat-pill{
  padding:8px 12px;border-radius:20px;font-size:12px;font-weight:700;
  font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:6px;
}
.stat-time{background:rgba(77,158,255,0.08);color:var(--blue);}
.stat-score{background:rgba(34,211,122,0.08);color:var(--green);}

.quiz-container{max-width:760px;margin:20px auto;padding:0 20px 100px 20px;}
.q-card{
  background:var(--panel);border:1px solid var(--border);border-radius:20px;
  padding:24px;position:relative;margin-bottom:24px;
  animation:popIn 0.4s ease;
}
@keyframes popIn{from{opacity:0;transform:scale(0.98);}to{opacity:1;transform:scale(1);}}

.q-tag{position:absolute;top:20px;right:20px;font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;}
.q-tag.obj{background:rgba(77,158,255,0.1);color:var(--blue);}
.q-tag.sub{background:rgba(34,211,122,0.1);color:var(--green);}
.q-tag.thy{background:rgba(192,132,252,0.1);color:var(--purple);}

.q-header{display:flex; gap:12px; margin-bottom:16px; padding-right:50px;}
.q-speak{
  min-width:32px; height:32px; border-radius:10px; background:var(--bg2); border:1px solid var(--border);
  color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.q-text{font-size:17px;font-weight:600;color:var(--white);line-height:1.5;}

.opt-btn{
  width:100%;text-align:left;padding:16px 18px;margin-bottom:10px;
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  color:var(--text);cursor:pointer;font-family:inherit;font-size:15px; transition:all 0.2s;
  display:flex; align-items:flex-start; line-height:1.4;
}
.opt-btn:active:not(:disabled){transform:scale(0.98);}

/* Logic States */
.opt-btn.correct {
  border-color:var(--green) !important;
  background:rgba(34,211,122,0.15) !important;
  color:var(--green) !important;
}
.opt-btn.wrong {
  border-color:var(--red) !important;
  background:rgba(255,77,77,0.15) !important;
  color:var(--red) !important;
}

.reveal-box{margin-top:16px;padding:16px;background:rgba(240,180,41,0.05);border-radius:12px;display:none;border-left:2px solid var(--gold);line-height:1.8;font-size:14px;}
.reveal-box.show{display:block; animation:fadeIn 0.3s;}
.reveal-box div{word-break:break-word;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.load-more-btn{
  width:100%; padding:18px; background:var(--panel2); border:1px dashed var(--border);
  color:var(--text); border-radius:16px; cursor:pointer; font-weight:600; font-family:'Sora', sans-serif;
}
.load-more-btn:disabled{opacity:0.5; cursor:wait;}

/* OVERLAYS */
.loader-overlay{
  position:fixed; inset:0; background:rgba(5,5,7,0.95); z-index:200; 
  display:none; flex-direction:column; align-items:center; justify-content:center;
}
.loader-overlay.active{display:flex;}
.loader-spinner{width:50px;height:50px;border:4px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px;}
.loader-text{font-size:18px;font-weight:700;color:var(--white);}
.loader-sub{font-size:12px;color:var(--text);margin-top:5px;}
@keyframes spin{to{transform:rotate(360deg);}}

.extract-overlay{
  position:fixed; inset:0; background:rgba(5,5,7,0.85); backdrop-filter:blur(8px);
  z-index:250; display:none; align-items:center; justify-content:center; padding:20px;
}
.extract-overlay.active{display:flex;}
.extract-card{
  width:100%; max-width:500px; background:var(--panel); border:1px solid var(--border);
  border-radius:24px; padding:24px; box-shadow:0 20px 60px rgba(0,0,0,0.6);
  display:flex; flex-direction:column; max-height:80vh; animation:popIn 0.3s ease;
}
.extract-body{
  flex:1; background:var(--bg2); border:1px solid var(--border); border-radius:12px;
  padding:16px; overflow-y:auto; font-family:'JetBrains Mono',monospace; font-size:13px;
  color:var(--white); margin-bottom:20px; white-space:pre-wrap;
}
.extract-actions{display:flex; gap:10px;}
.btn-copy{flex:2; background:var(--gold); color:#000; font-weight:800; border:none; padding:16px; border-radius:12px;}
.btn-close{flex:1; background:var(--panel2); color:var(--text); font-weight:600; border:1px solid var(--border); padding:16px; border-radius:12px;}

.toast-box{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(100px);
  background:var(--panel2); border:1px solid var(--gold); color:var(--white);
  padding:12px 24px; border-radius:12px; font-weight:600; z-index:300;
  transition:all 0.3s; opacity:0;
}
.toast-box.show{transform:translateX(-50%) translateY(0); opacity:1;}
</style>
</head>
<body>

<div class="loader-overlay" id="loaderOverlay">
  <div class="loader-spinner"></div>
  <div class="loader-text" id="loaderTitle">Processing...</div>
  <div class="loader-sub" id="loaderSub"></div>
</div>

<div class="toast-box" id="toastBox">✅ Notification</div>

<div class="extract-overlay" id="extractOverlay">
  <div class="extract-card">
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:20px;font-weight:800;color:var(--gold);">Extracted Text</div>
    </div>
    <div class="extract-body" id="extractContent">...</div>
    <div class="extract-actions">
      <button class="btn-close" onclick="closeExtract()">Cancel</button>
      <button class="btn-copy" onclick="copyAndClose()">COPY & CLOSE</button>
    </div>
  </div>
</div>

<input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handlePhotos(this)">

<div id="uploadScreen" class="screen active">
  <div class="upload-box">
    <div class="brand-header">
      <div class="brand-crown">👑</div>
      <h1 class="brand-title">Prof Kingkeys Academy</h1>
      <div style="font-size:12px;color:var(--gold);margin-top:5px;">MASTER EDITION</div>
    </div>

    <div class="input-area">
      <textarea id="userInput" placeholder="PASTE NOTES OR UPLOAD PHOTOS...

📸 Click 'Add Photos' to scan text from books/notes.
🎧 Click 'Read Mode' for the new glitch-free audio player.
🚀 Click 'Start Quiz' for the infinite exam engine."></textarea>
      
      <div class="tools-row">
        <button class="tool-btn camera" onclick="document.getElementById('photoInput').click()">
          📸 Add Photos
        </button>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-main btn-read" onclick="startReadMode()">🎧 Read Mode</button>
      <button class="btn-main btn-gen" onclick="startGeneration()">🚀 Start Quiz</button>
    </div>
  </div>
</div>

<div id="readerScreen" class="screen">
  <div class="reader-top">
    <button class="back-btn" onclick="stopAudio(); showScreen('uploadScreen')">← Editor</button>
    <button class="tool-btn" onclick="copyText()">📋 Copy All</button>
  </div>
  
  <div class="reader-content" id="readerTextDisplay"></div>

  <div class="player-dock">
    <div class="p-speed" onclick="toggleSpeed()" id="speedLabel" style="color:#fff;font-family:monospace;">1.0x</div>
    <button class="p-btn-lg" id="playPauseBtn" onclick="togglePlay()">⏸</button>
  </div>
</div>

<div id="quizScreen" class="screen">
  <div class="quiz-dash">
    <button class="back-btn" onclick="stopQuiz()">← Exit</button>
    <div class="stats-group">
      <div class="stat-pill stat-time" id="timerDisplay">⏱ 00:00</div>
      <div class="stat-pill stat-score" id="scoreDisplay">★ 0%</div>
    </div>
  </div>
  <div class="quiz-container" id="quizContainer"></div>
  <div style="padding:0 20px 60px 20px;">
    <button class="load-more-btn" onclick="loadMoreQuestions()" id="loadMoreBtn">
      ⚡ Generate +20 Questions
    </button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//   UTILITIES (SHUFFLE & NORMALIZE)
// ═══════════════════════════════════════════════
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function normalize(str) {
  return (str || '').toString().toLowerCase()
    .replace(/[^\w\s]|_/g, "").replace(/\s+/g, " ").trim();
}

// ── Smart semantic match for subjective answers ──
function smartMatch(raw_user, raw_correct) {
  const u = normalize(raw_user);
  const c = normalize(raw_correct);
  if (!u || !c) return false;

  // 1. Exact
  if (u === c) return true;

  // 2. Simple containment
  if (u.includes(c) || c.includes(u)) return true;

  // 3. Stem match — share root (handles autoclaving/autoclave, sterilizing/sterilize etc.)
  const minLen = Math.min(u.length, c.length);
  if (minLen >= 5) {
    const stemLen = Math.max(4, Math.floor(minLen * 0.78));
    if (u.substring(0, stemLen) === c.substring(0, stemLen)) return true;
  }

  // 4. Key-word overlap — ignore short stop-words, check significant word overlap
  const STOP = new Set(['the','a','an','of','in','is','are','and','or','to','for','with','by','on','at','as']);
  const uWords = u.split(' ').filter(w => w.length > 2 && !STOP.has(w));
  const cWords = c.split(' ').filter(w => w.length > 2 && !STOP.has(w));
  if (uWords.length > 0 && cWords.length > 0) {
    const matched = uWords.filter(uw => cWords.some(cw => cw.includes(uw) || uw.includes(cw)));
    const ratio = matched.length / Math.max(uWords.length, cWords.length);
    if (ratio >= 0.55) return true;
  }

  // 5. Acronym ↔ full-form  (e.g. "LAL" vs "Limulus Amebocyte Lysate")
  function makeAcronym(words) { return words.filter(w => w.length > 0).map(w => w[0]).join(''); }
  const uAcro = makeAcronym(u.replace(/[^\w\s]/g,'').split(' ').filter(Boolean));
  const cAcro = makeAcronym(c.replace(/[^\w\s]/g,'').split(' ').filter(Boolean));
  if (u === cAcro || c === uAcro) return true;

  return false;
}

// ── Format quiz reveal text with same structure as Read Mode ──
function formatReveal(text) {
  if (!text) return '';
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if (lines.length <= 1) return `<span>${cleanDisplay(text)}</span>`;
  let html = '';
  lines.forEach(line => {
    if (/^\d+[\.\)]\s+/.test(line)) {
      const content = line.replace(/^\d+[\.\)]\s*/, '');
      html += `<div style="display:flex;gap:8px;margin:5px 0;"><span style="color:var(--gold);font-weight:700;flex-shrink:0;">${line.match(/^\d+/)[0]}.</span><span>${cleanDisplay(content)}</span></div>`;
    } else if (/^[\*\-•–]\s+/.test(line)) {
      const content = line.replace(/^[\*\-•–]\s*/, '');
      html += `<div style="display:flex;gap:8px;margin:5px 0;"><span style="color:var(--gold);flex-shrink:0;">▸</span><span>${cleanDisplay(content)}</span></div>`;
    } else if (/^[A-Z*#].*:$/.test(line) || /^\*\*/.test(line)) {
      html += `<div style="color:var(--gold);font-weight:700;margin:10px 0 4px;">${cleanDisplay(line)}</div>`;
    } else {
      html += `<div style="margin:4px 0;">${cleanDisplay(line)}</div>`;
    }
  });
  return html;
}

// ═══════════════════════════════════════════════
//   STATE
// ═══════════════════════════════════════════════
let sentences = [];
let currentSentenceIdx = 0;
let synth = window.speechSynthesis;
let isPlaying = false;
let readSpeed = 1.0;
let quizData = [];
let quizStats = { total:0, correct:0, startTime:0, timerInterval:null, paused:false };
let extractedTextBuffer = "";

// ── Background Music ──
let bgMusic = null;
let musicFadeTimer = null;
const MUSIC_VOL_SPEAK = 0.06;   // ducked while voice is reading
const MUSIC_VOL_QUIET = 0.26;   // raised when voice is silent

function initBgMusic() {
  if (bgMusic) { bgMusic.play().catch(()=>{}); return; }
  bgMusic = new Audio('https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3');
  bgMusic.loop = true;
  bgMusic.volume = MUSIC_VOL_QUIET;
  bgMusic.play().catch(() => {});
}

function fadeMusicTo(target) {
  if (!bgMusic) return;
  clearInterval(musicFadeTimer);
  const step = target > bgMusic.volume ? 0.008 : -0.008;
  musicFadeTimer = setInterval(() => {
    const next = bgMusic.volume + step;
    if ((step > 0 && next >= target) || (step < 0 && next <= target)) {
      bgMusic.volume = Math.max(0, Math.min(1, target));
      clearInterval(musicFadeTimer);
    } else {
      bgMusic.volume = Math.max(0, Math.min(1, next));
    }
  }, 25);
}

function musicDuck()  { fadeMusicTo(MUSIC_VOL_SPEAK); }
function musicRise()  { fadeMusicTo(MUSIC_VOL_QUIET); }

function stopBgMusic() {
  clearInterval(musicFadeTimer);
  if (bgMusic) { bgMusic.pause(); bgMusic.currentTime = 0; bgMusic = null; }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function getBritishVoice() {
  const voices = synth.getVoices();
  return voices.find(v => v.lang === 'en-GB' && (v.name.includes('Female') || v.name.includes('Google'))) 
      || voices.find(v => v.lang === 'en-GB')
      || voices.find(v => v.lang.startsWith('en'));
}

function toggleLoader(show, title, sub) {
  const el = document.getElementById('loaderOverlay');
  if(show) {
    el.classList.add('active');
    document.getElementById('loaderTitle').innerText = title;

function showToast(msg) {

// ═══════════════════════════════════════════════
//   OCR (PHOTO)
// ═══════════════════════════════════════════════
async function handlePhotos(input) {
  if (input.files.length === 0) return;
  toggleLoader(true, "Scanning...", "Loading OCR Engine...");
  let combinedText = "";
  try {
    for (let i = 0; i < input.files.length; i++) {
      toggleLoader(true, `Scanning Img ${i+1}...`, "Pattern Matching...");
      const { data: { text } } = await Tesseract.recognize(
        input.files[i], 'eng', { logger: m => {} } 
      );
      combinedText += `\n${text}\n`;
    }
    if (!combinedText.trim()) throw new Error("No text found.");
    extractedTextBuffer = combinedText.trim();
    toggleLoader(false);
    document.getElementById('extractContent').innerText = extractedTextBuffer;
    document.getElementById('extractOverlay').classList.add('active');
  } catch (e) {
    toggleLoader(false);
    showToast("❌ OCR Failed: " + (e.message || "Try again"));
  }
}

function copyAndClose() {
  if(!extractedTextBuffer) return;
  navigator.clipboard.writeText(extractedTextBuffer).then(() => {
    showToast("✅ Copied!");
    closeExtract();
  });
}

function closeExtract() {
  document.getElementById('extractOverlay').classList.remove('active');

  document.getElementById('photoInput').value = "";
}

// ═══════════════════════════════════════════════
//   READER MODE
// ═══════════════════════════════════════════════

// Clean text for display: remove lone asterisks, convert **bold** to <strong>
function cleanDisplay(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\*/g, '')
    .replace(/#/g, '')
    .trim();
}

// Clean text for TTS: strip all markdown symbols
function cleanSpeech(text) {
  return text.replace(/\*+/g, '').replace(/#+/g, '').replace(/_/g, '').replace(/`/g, '').trim();
}

// Detect if a block of lines looks like a markdown table
function isTableRow(line) { return /^\|.+\|/.test(line); }
function isTableSep(line) { return /^\|[\s\-:|]+\|/.test(line); }

function formatTextToHTML(rawText) {
  sentences = []; // reset global
  let html = '';
  let sid = 0;

  // Normalise line endings, split
  const lines = rawText.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  let i = 0;

  function addSentence(speechText, displayHTML, tag, extraStyle) {
    const idx = sid++;
    sentences.push(cleanSpeech(speechText));
    const t = tag || 'span';
    const style = extraStyle ? ` style="${extraStyle}"` : '';
    return `<${t} id="sent-${idx}" class="reader-sentence" onclick="clickToRead(${idx})"${style}>${displayHTML}</${t}>`;
  }

  function splitSentences(text) {
    // Split on sentence-ending punctuation
    const parts = text.match(/[^.!?]+[.!?]+(?:\s|$)|[^.!?]+$/g) || [text];
    return parts.map(p => p.trim()).filter(p => p.length > 1);
  }

  while (i < lines.length) {
    let line = lines[i].trimEnd();
    const trimmed = line.trim();

    // ── Empty line ──
    if (trimmed === '') {
      html += '<div class="reader-divider"></div>';
      i++;
      continue;
    }

    // ── Heading: starts with # ──
    if (/^#{1,4}\s/.test(trimmed)) {
      const level = trimmed.match(/^(#{1,4})/)[1].length;
      const content = trimmed.replace(/^#{1,4}\s*/, '');
      const size = level === 1 ? '22px' : level === 2 ? '19px' : '17px';
      html += `<div class="reader-heading" style="font-size:${size};">${cleanDisplay(content)}</div>`;
      i++;
      continue;
    }

    // ── Heading: ALL CAPS short line (treat as section title) ──
    if (trimmed.length <= 80 && trimmed === trimmed.toUpperCase() && /[A-Z]/.test(trimmed) && !/[a-z]/.test(trimmed)) {
      html += `<div class="reader-heading" style="font-size:17px;letter-spacing:0.5px;">${cleanDisplay(trimmed)}</div>`;
      i++;
      continue;
    }

    // ── Short heading-like line ending with colon (no sentence) ──
    if (/^[A-Z][^.!?]{0,60}:$/.test(trimmed) && !trimmed.includes('|')) {
      html += `<div class="reader-heading" style="font-size:16px;">${cleanDisplay(trimmed)}</div>`;
      i++;
      continue;
    }

    // ── Table → stacked cards (mobile-safe) ──
    if (isTableRow(trimmed)) {
      let tableLines = [];
      while (i < lines.length && (isTableRow(lines[i].trim()) || isTableSep(lines[i].trim()))) {
        tableLines.push(lines[i].trim());
        i++;
      }
      // Parse headers & data rows
      let headers = [];
      let dataRows = [];
      let headerDone = false;
      tableLines.forEach(row => {
        if (isTableSep(row)) { headerDone = true; return; }
        const cells = row.split('|').filter(c => c.trim() !== '').map(c => c.trim());
        if (!headerDone) { headers = cells; }
        else { dataRows.push(cells); }
      });
      // If no separator, treat first row as headers
      if (!headerDone && tableLines.length > 1) {
        const allRows = tableLines.map(r => r.split('|').filter(c => c.trim() !== '').map(c => c.trim()));
        headers = allRows[0] || [];
        dataRows = allRows.slice(1);
      }

      html += '<div class="reader-table-wrap">';

      // Each data row → a card
      dataRows.forEach(cells => {
        // Build TTS: "Feature: Scope of Detection. Rabbit Pyrogen Test: Detects both bacterial…"
        const speechParts = cells.map((cell, ci) => {
          const hdr = headers[ci] ? cleanSpeech(headers[ci]) : `Column ${ci + 1}`;
          return `${hdr}: ${cleanSpeech(cell)}`;
        });
        const speechText = speechParts.join('. ');
        const idx = sid++;
        sentences.push(speechText);

        html += `<div id="sent-${idx}" class="reader-table-card reader-sentence" onclick="clickToRead(${idx})">`;
        cells.forEach((cell, ci) => {
          const label = headers[ci] ? cleanDisplay(headers[ci]) : `Col ${ci + 1}`;
          html += `<div class="rtc-row"><div class="rtc-label">${label}</div><div class="rtc-value">${cleanDisplay(cell)}</div></div>`;
        });
        html += '</div>';
      });

      html += '</div>';
      continue;
    }

    // ── Numbered list ──
    if (/^\d+[\.\)]\s+/.test(trimmed)) {
      html += '<ol style="padding-left:26px;margin:10px 0 14px;">';
      while (i < lines.length && /^\d+[\.\)]\s+/.test(lines[i].trim())) {
        const content = lines[i].trim().replace(/^\d+[\.\)]\s*/, '');
        html += addSentence(content, cleanDisplay(content), 'li', '');
        i++;
      }
      html += '</ol>';
      continue;
    }

    // ── Bullet list (*, -, •, –) ──
    if (/^[\*\-•–]\s+/.test(trimmed)) {
      html += '<ul style="padding-left:26px;margin:10px 0 14px;list-style:disc;">';
      while (i < lines.length && /^[\*\-•–]\s+/.test(lines[i].trim())) {
        const content = lines[i].trim().replace(/^[\*\-•–]\s*/, '');
        html += addSentence(content, cleanDisplay(content), 'li', '');
        i++;
      }
      html += '</ul>';
      continue;
    }

    // ── Standalone asterisk-prefixed line (common AI output style: * Key: value) ──
    if (/^\*[^*]/.test(trimmed) && !/\*\*/.test(trimmed)) {
      html += '<ul style="padding-left:26px;margin:10px 0 14px;list-style:disc;">';
      while (i < lines.length && /^\*[^*]/.test(lines[i].trim()) && !/^\*\*/.test(lines[i].trim())) {
        const content = lines[i].trim().replace(/^\*\s*/, '');
        html += addSentence(content, cleanDisplay(content), 'li', '');
        i++;
      }
      html += '</ul>';
      continue;
    }

    // ── Regular paragraph line ──
    const cleanedLine = cleanSpeech(trimmed); // for sentence splitting
    if (!cleanedLine) { i++; continue; }

    const parts = splitSentences(cleanedLine);
    html += '<p>';
    if (parts.length === 0) {
      html += addSentence(cleanedLine, cleanDisplay(trimmed), 'span', '');
    } else {
      parts.forEach(part => {
        html += addSentence(part, cleanDisplay(part), 'span', '');
      });
    }
    html += '</p>';
    i++;
  }

  return html;
}

function startReadMode() {
  const rawText = document.getElementById('userInput').value;
  if (!rawText) return showToast("⚠️ Paste text first");
  sentences = [];
  const display = document.getElementById('readerTextDisplay');
  display.innerHTML = formatTextToHTML(rawText);
  showScreen('readerScreen');
  currentSentenceIdx = 0;
  initBgMusic();   // 🎵 start warm music
  playSequence();
}

function clickToRead(idx) {
  synth.cancel();
  isPlaying = false;
  currentSentenceIdx = idx;
  highlightSentence(idx);
  setTimeout(() => playSequence(), 50);
}

function highlightSentence(idx) {
  document.querySelectorAll('.reader-sentence').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`sent-${idx}`);
  if(el) {
    el.classList.add('active');
    el.scrollIntoView({behavior: "smooth", block: "center"});
  }
}

function playSequence() {
  if(currentSentenceIdx >= sentences.length) {
    isPlaying = false;
    document.getElementById('playPauseBtn').innerText = '▶';
    musicRise();   // 🎵 raise music when reading finishes
    return;
  }
  isPlaying = true;
  document.getElementById('playPauseBtn').innerText = '⏸';
  highlightSentence(currentSentenceIdx);
  const speechText = sentences[currentSentenceIdx].replace(/\*/g, '').replace(/#+/g, '').trim();
  const utter = new SpeechSynthesisUtterance(speechText);
  const voice = getBritishVoice();
  if(voice) utter.voice = voice;
  utter.rate = readSpeed;
  utter.onstart = () => { musicDuck(); };   // 🎵 duck when voice starts
  utter.onend = () => {
    if(isPlaying) { currentSentenceIdx++; playSequence(); }
    else { musicRise(); }                   // 🎵 raise if paused mid-read
  };
  synth.speak(utter);
}

function togglePlay() {
  if(isPlaying) {
    synth.cancel(); isPlaying = false;
    document.getElementById('playPauseBtn').innerText = '▶';
    musicRise();   // 🎵 raise music when paused
  } else {
    playSequence();
  }
}

function stopAudio() {
  synth.cancel();
  isPlaying = false;
  stopBgMusic();   // 🎵 stop music when leaving reader
}
function toggleSpeed() {
  readSpeed = readSpeed === 1.0 ? 1.5 : (readSpeed === 1.5 ? 2.0 : 1.0);
  document.getElementById('speedLabel').innerText = readSpeed + 'x';
}
function copyText() {
  navigator.clipboard.writeText(document.getElementById('userInput').value).then(() => showToast("✅ Copied!"));
}

// ═══════════════════════════════════════════════
//   QUIZ ENGINE (MASTER)
// ═══════════════════════════════════════════════
function strictRepairJSON(text) {
  try { return JSON.parse(text.replace(/```json/g,'').replace(/```/g,'').trim()); } catch(e){}
  const objs = [];
  const regex = /\{[\s\S]*?\}/g; 
  let m;
  while((m = regex.exec(text)) !== null) {
    try { 
      let clean = m[0].replace(/,\s*}/g, '}');
      objs.push(JSON.parse(clean)); 
    } catch(e){}
  }
  return objs;
}

async function startGeneration() {
  const text = document.getElementById('userInput').value;
  if(text.length < 50) return showToast("⚠️ Need more text");
  quizData = [];
  quizStats = { total: 0, correct: 0, startTime: Date.now(), timerInterval: null, paused: false };
  document.getElementById('quizContainer').innerHTML = '';
  startTimer();
  updateScore();
  showScreen('quizScreen');
  await loadMoreQuestions();
}

async function loadMoreQuestions() {
  const fullText = document.getElementById('userInput').value;
  quizStats.paused = true;
  toggleLoader(true, "AI Analyzing...", "Shuffling & Generating");

  try {
    let contextText = fullText;
    if(fullText.length > 3000) {
      const start = Math.floor(Math.random() * (fullText.length - 2500));
      contextText = fullText.substring(start, start + 2500);
    }

    const prompt = `
      Act as a Professor setting a University Final Exam.
      Generate: 10 Objective (MCQ), 5 Subjective (Fill-in), 2 Theory.
      
      CRITICAL RULES:
      1. DIFFICULTY: Questions must be TRICKY. Use plausible distractors. No obvious answers.
      2. FORMAT: Objective questions MUST have 4 options as full sentence/phrase options (NOT "A.", "B." prefixes).
      3. ANSWER (Objective): Copy the EXACT full text of the correct option into the 'answer' field. Must match one of the options WORD FOR WORD.
      4. ANSWER (Subjective): Give ONLY the core answer word or phrase (1-5 words max). NO parentheses, NO explanations, NO abbreviations with full forms — pick ONE form only.
      5. ANSWER (Theory): Give a detailed but structured answer using numbered points where applicable.
      6. EXPLANATION: For objective only — explain WHY the answer is correct in 1-2 sentences.
      
      Schema: 
      [
        {"type":"objective", "question":"...", "options":["Full text A","Full text B","Full text C","Full text D"], "answer":"Full text A", "explanation":"..."},
        {"type":"subjective", "question":"...", "answer":"Word or short phrase only"},
        {"type":"theory", "question":"...", "answer":"1. Point one\n2. Point two\n3. Point three"}
      ]
      
      TEXT: ${contextText.replace(/[^\x20-\x7E\n]/g, '')}
    `;

    const res = await puter.ai.chat(prompt);
    let newQs = strictRepairJSON(res?.message?.content || res);
    
    // Process & Shuffle
    if (newQs && newQs.length) {
      newQs.forEach(q => {
        if (q.type === 'objective') {
          if (!q.options || q.options.length < 4) {
            q.type = 'subjective';
          } else {
            // ── RESOLVE ANSWER TO FULL OPTION TEXT before shuffling ──
            // AI sometimes returns answer as "A", "B", "C", "D" or just a partial.
            // We find the matching option text now so shuffle can't break it.
            const ansNorm = normalize(q.answer || '');
            const letterMap = { a:0, b:1, c:2, d:3 };

            // Try exact text match first
            let resolved = q.options.find(opt => normalize(opt) === ansNorm);

            // Try letter-only match (e.g. answer = "A" or "A.")
            if (!resolved) {
              const letter = ansNorm.replace(/[^a-d]/g, '').charAt(0);
              if (letter && letterMap[letter] !== undefined) {
                resolved = q.options[letterMap[letter]];
              }
            }

            // Try partial/smart match as fallback
            if (!resolved) {
              resolved = q.options.find(opt => smartMatch(ansNorm, normalize(opt)));
            }

            // Commit resolved full-text answer
            if (resolved) q.answer = resolved;

            // NOW shuffle safely
            q.options = shuffleArray(q.options);
          }
        }
      });
      renderQuestions(newQs, quizData.length);
      quizData = [...quizData, ...newQs];
    } else { throw new Error("Invalid"); }

  } catch(e) {
    showToast("⚠️ AI Busy. Retrying...");
  } finally {
    toggleLoader(false);
    quizStats.paused = false;
  }
}

function renderQuestions(qs, startIndex) {
  const container = document.getElementById('quizContainer');
  qs.forEach((q, i) => {
    const idx = startIndex + i;
    const div = document.createElement('div');
    div.className = 'q-card';
    
    let inner = `
      <div class="q-tag ${q.type.substring(0,3)}">${q.type.toUpperCase()}</div>
      <div class="q-header">
        <div class="q-speak" onclick="speakText('${q.question.replace(/'/g,"")}')">🔊</div>
        <div class="q-text">${idx+1}. ${q.question}</div>
      </div>
    `;

    if(q.type === 'objective') {
      q.options.forEach((opt, optIdx) => {
        inner += `<button class="opt-btn" onclick="handleObjClick(${idx}, ${optIdx})">${opt}</button>`;
      });
      inner += `<div class="reveal-box" id="rev-${idx}"></div>`;
    } 
    else if (q.type === 'subjective') {
      inner += `<input type="text" class="opt-btn" id="sub-input-${idx}" placeholder="Type your answer here..." style="cursor:text;" />`;
      inner += `<button class="opt-btn sub-submit-btn" id="sub-btn-${idx}" onclick="handleSubAnswer(document.getElementById('sub-input-${idx}'), ${idx})" style="text-align:center;border-color:var(--blue);color:var(--blue);margin-top:2px;">✅ Submit Answer</button>`;
      inner += `<div class="reveal-box" id="rev-${idx}"></div>`;
    }
    else {
      inner += `<button class="opt-btn" style="text-align:center;border-color:var(--purple);color:var(--purple)" onclick="handleThyReveal(${idx})">👁 Reveal Answer</button>`;
      inner += `<div class="reveal-box" id="rev-${idx}">${formatReveal(q.answer)}</div>`;
    }
    div.innerHTML = inner;
    container.appendChild(div);
  });
}

// ═══════════════════════════════════════════════
//   LOGIC (NORMALIZED COMPARISON)
// ═══════════════════════════════════════════════
function handleObjClick(qIdx, optIdx) {
  const q = quizData[qIdx];
  if (!q) return;
  const selectedText = q.options[optIdx];
  const correctText  = q.answer;
  const container    = document.getElementById(`rev-${qIdx}`).parentElement;
  const buttons      = container.querySelectorAll('button.opt-btn');
  const reveal       = document.getElementById(`rev-${qIdx}`);

  buttons.forEach(b => b.disabled = true);

  // ── Triple-layer comparison: exact → normalized → smart ──
  const isCorrect = normalize(selectedText) === normalize(correctText)
                 || smartMatch(selectedText, correctText);

  // Find the visually-correct button reliably
  let correctBtnIdx = -1;
  buttons.forEach((b, i) => {
    const match = normalize(q.options[i]) === normalize(correctText)
               || smartMatch(q.options[i], correctText);
    if (match) correctBtnIdx = i;
  });

  if (isCorrect) {
    buttons[optIdx].classList.add('correct');
    quizStats.correct++;
    speakText(`Correct! ${q.explanation || ''}`);
  } else {
    buttons[optIdx].classList.add('wrong');
    if (correctBtnIdx >= 0) buttons[correctBtnIdx].classList.add('correct');
    speakText(`Incorrect. The answer is ${correctText}. ${q.explanation || ''}`);
  }

  // Structured formatted reveal
  const explanationHTML = formatReveal(q.explanation || (isCorrect ? 'Well done!' : `Correct answer: ${correctText}`));
  reveal.innerHTML = explanationHTML;
  reveal.classList.add('show');
  quizStats.total++;
  updateScore();
}

function handleSubAnswer(input, qIdx) {
  if (input.disabled) return;
  const q = quizData[qIdx];
  if (!q) return;
  const reveal = document.getElementById(`rev-${qIdx}`);

  input.disabled = true;
  // Disable submit button too
  const submitBtn = document.getElementById(`sub-btn-${qIdx}`);
  if (submitBtn) submitBtn.disabled = true;

  // ── Smart multi-strategy matching ──
  const isCorrect = smartMatch(input.value, q.answer);

  if (isCorrect) {
    input.style.borderColor = 'var(--green)';
    input.style.color = 'var(--green)';
    quizStats.correct++;
    speakText(`Correct! The answer is ${q.answer}`);
  } else {
    input.style.borderColor = 'var(--red)';
    input.style.color = 'var(--red)';
    speakText(`Incorrect. The answer is ${q.answer}`);
  }

  // Formatted structured reveal
  const answerHTML = formatReveal(q.answer);
  reveal.innerHTML = `<div style="margin-bottom:6px;font-weight:700;color:${isCorrect?'var(--green)':'var(--gold)'};">${isCorrect ? '✅ Correct Answer:' : '📖 Correct Answer:'}</div>${answerHTML}`;
  reveal.classList.add('show');
  quizStats.total++;
  updateScore();
}

function handleThyReveal(idx) {
  document.getElementById(`rev-${idx}`).classList.add('show');
  speakText(quizData[idx].answer);
}

function speakText(t) {
  synth.cancel();
  const u = new SpeechSynthesisUtterance(t);
  const v = getBritishVoice();
  if(v) u.voice = v;
  u.rate = readSpeed;
  synth.speak(u);
}

function startTimer() {
  if(quizStats.timerInterval) clearInterval(quizStats.timerInterval);
  quizStats.startTime = Date.now();
  quizStats.timerInterval = setInterval(() => {
    if(!quizStats.paused) {
      const d = Math.floor((Date.now() - quizStats.startTime)/1000);
      const m = Math.floor(d/60).toString().padStart(2,'0');
      const s = (d%60).toString().padStart(2,'0');
      document.getElementById('timerDisplay').innerText = `⏱ ${m}:${s}`;
    } else { quizStats.startTime += 1000; }
  }, 1000);
}

function updateScore() {
  const p = quizStats.total===0?0:Math.round((quizStats.correct/quizStats.total)*100);
  document.getElementById('scoreDisplay').innerText = `★ ${p}%`;
}

function stopQuiz() {
  clearInterval(quizStats.timerInterval);
  stopAudio();
  showScreen('uploadScreen');
}

window.speechSynthesis.onvoiceschanged = getBritishVoice;
</script>
